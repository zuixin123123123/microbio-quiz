<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<title>微生物学 · 做题练习</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #f0f2f5; --card-bg: #fff; --text: #1a1a1a; --text-secondary: #888;
  --border: #e5e7eb; --accent: #4f46e5; --accent-light: #eef2ff;
  --correct: #059669; --correct-bg: #ecfdf5; --wrong: #dc2626; --wrong-bg: #fef2f2;
  --shadow: 0 1px 3px rgba(0,0,0,.08); --radius: 12px;
  --explanation-bg: #fffbeb; --explanation-border: #fde68a;
  --tag-choice-bg: #ede9fe; --tag-choice-color: #7c3aed;
  --tag-judge-bg: #fce7f3; --tag-judge-color: #db2777;
  --correct-option-bg: #d1fae5; --correct-option-color: #065f46;
  --wrong-option-bg: #fee2e2; --wrong-option-color: #991b1b;

  --review-border: var(--wrong);
}
[data-theme="dark"] {
  --bg: #1a1a2e; --card-bg: #252540; --text: #e0e0e0; --text-secondary: #999;
  --border: #3a3a55; --accent: #7c7cf8; --accent-light: #2a2a45;
  --correct: #34d399; --correct-bg: #1a3a2a; --wrong: #f87171; --wrong-bg: #3a1a1a;
  --shadow: 0 1px 3px rgba(0,0,0,.3); --radius: 12px;
  --explanation-bg: #2a2a1a; --explanation-border: #5a5a2a;
  --tag-choice-bg: #2a2045; --tag-choice-color: #a78bfa;
  --tag-judge-bg: #3a2045; --tag-judge-color: #f472b6;
  --correct-option-bg: #1a3a2a; --correct-option-color: #6ee7b7;
  --wrong-option-bg: #3a1a1a; --wrong-option-color: #fca5a5;

  --review-border: var(--wrong);
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", "PingFang SC", sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.7;
}
.container { max-width: 780px; margin: 0 auto; padding: 20px 16px 80px; }

.header { text-align: center; padding: 28px 0 4px; }
.header h1 { font-size: 1.5em; font-weight: 700; margin-bottom: 2px; }
.header .sub { font-size: .85em; color: var(--text-secondary); }

.controls {
  background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow);
  padding: 14px 18px; margin: 16px 0; display: flex; flex-wrap: wrap;
  gap: 10px; align-items: center;
}
.controls label { font-size: .85em; color: var(--text-secondary); white-space: nowrap; }
.controls select, .controls button {
  padding: 7px 14px; border: 1.5px solid var(--border); border-radius: 8px;
  font-size: .85em; background: var(--card-bg); cursor: pointer; font-family: inherit;
  transition: all .15s;
}
.controls select:hover { border-color: var(--accent); }
.controls button {
  background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 500;
}
.controls button:hover { opacity: .85; }
.controls button.secondary { background: var(--card-bg); color: var(--text); border-color: var(--border); }
.controls select.dark-option { color-scheme: dark; }
.controls .spacer { flex: 1; }
[data-theme="dark"] .controls select, [data-theme="dark"] .controls button { color: var(--text); }
[data-theme="dark"] .controls select option { background: var(--card-bg); color: var(--text); }
[data-theme="dark"] .results td:first-child { color: var(--text-secondary); }

.stats {
  display: flex; gap: 20px; align-items: center; font-size: .88em;
  color: var(--text-secondary); margin-bottom: 10px; padding: 0 2px;
}
.stats .correct-count { color: var(--correct); font-weight: 600; }
.stats .wrong-count { color: var(--wrong); font-weight: 600; }
.stats .remaining { margin-left: auto; }

.progress-bar { width: 100%; height: 5px; background: var(--border); border-radius: 3px; margin-bottom: 20px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .35s ease; }

.card {
  background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow);
  padding: 28px 28px 22px; margin-bottom: 16px; border: 2px solid transparent;
  transition: border-color .2s, background .2s;
}
.card.correct { border-color: var(--correct); background: var(--correct-bg); }
.card.wrong { border-color: var(--wrong); background: var(--wrong-bg); }

.q-tag {
  display: inline-block; font-size: .72em; padding: 3px 10px; border-radius: 20px;
  margin-bottom: 14px; font-weight: 600; letter-spacing: .5px;
}
.q-tag.choice { background: var(--tag-choice-bg); color: var(--tag-choice-color); }
.q-tag.judge { background: var(--tag-judge-bg); color: var(--tag-judge-color); }

.q-stem { font-size: 1.08em; margin-bottom: 22px; line-height: 1.85; }

.options { display: flex; flex-direction: column; gap: 8px; }
.option {
  padding: 13px 18px; border: 2px solid var(--border); border-radius: 10px;
  cursor: pointer; transition: all .12s; font-size: .98em; background: var(--card-bg);
  display: flex; align-items: center; gap: 10px;
}
.option:hover { border-color: var(--accent); background: var(--accent-light); transform: translateX(2px); }
.option.selected { border-color: var(--accent); background: var(--accent-light); }
.option.correct-answer { border-color: var(--correct); background: var(--correct-option-bg); color: var(--correct-option-color); font-weight: 600; }
.option.wrong-answer { border-color: var(--wrong); background: var(--wrong-option-bg); color: var(--wrong-option-color); font-weight: 600; }
.option.dim { opacity: .4; }
.option:disabled { pointer-events: none; }
.opt-letter { font-weight: 700; font-size: .9em; color: var(--accent); min-width: 22px; }
.option.correct-answer .opt-letter { color: var(--correct); }
.option.wrong-answer .opt-letter { color: var(--wrong); }

.judge-btns { display: flex; gap: 12px; }
.judge-btn {
  flex: 1; padding: 18px; border: 2px solid var(--border); border-radius: 10px;
  font-size: 1.05em; font-weight: 600; cursor: pointer; background: var(--card-bg);
  transition: all .12s; text-align: center;
}
.judge-btn:hover { border-color: var(--accent); background: var(--accent-light); transform: translateY(-2px); }
.judge-btn.correct-answer { border-color: var(--correct); background: var(--correct-option-bg); color: var(--correct-option-color); }
.judge-btn.wrong-answer { border-color: var(--wrong); background: var(--wrong-option-bg); color: var(--wrong-option-color); }
.judge-btn:disabled { pointer-events: none; opacity: .5; }
.judge-icon { font-size: 1.4em; display: block; margin-bottom: 4px; }

.explanation {
  margin-top: 18px; padding: 16px 18px; background: var(--explanation-bg); border-radius: 10px;
  border: 1px solid var(--explanation-border); font-size: .9em; line-height: 1.8; display: none;
}
.explanation.show { display: block; }

.actions { display: flex; gap: 10px; justify-content: center; margin-top: 8px; }
.actions button {
  padding: 10px 28px; border-radius: 10px; border: 2px solid var(--border);
  cursor: pointer; font-size: .95em; font-weight: 500; font-family: inherit;
  background: var(--card-bg); transition: all .15s;
}
.actions button:hover { border-color: var(--accent); background: var(--accent-light); }
.actions button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.actions button.primary:hover { opacity: .85; }

.results { display: none; text-align: center; padding: 40px 20px; }
.results.show { display: block; }
.results h2 { font-size: 1.3em; margin-bottom: 6px; }
.results .score-big { font-size: 3.5em; font-weight: 800; margin: 16px 0; }
.results .score-big.good { color: var(--correct); }
.results .score-big.ok { color: #d97706; }
.results .score-big.bad { color: var(--wrong); }
.results .detail { color: var(--text-secondary); font-size: .9em; margin-bottom: 16px; }
.results table { margin: 0 auto 20px; border-collapse: collapse; }
.results td { padding: 6px 20px; text-align: center; font-size: .95em; }
.results td:first-child { text-align: right; color: var(--text-secondary); }
.results td:last-child { font-weight: 600; }

.review-card {
  text-align: left; background: var(--card-bg); border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 18px 22px; margin-bottom: 12px;
  border-left: 4px solid var(--review-border);
}


@media (max-width: 500px) {
  .card { padding: 20px 14px 16px; }
  .q-stem { font-size: .98em; }
  .controls { flex-direction: column; align-items: stretch; }
  .judge-btns { flex-direction: column; }
}

/* PWA install button */
#btnInstall {
  position: fixed; bottom: 20px; right: 20px; z-index: 999;
  background: var(--accent); color: #fff; border: none; border-radius: 50px;
  padding: 14px 24px; font-size: .95em; font-weight: 600; font-family: inherit;
  cursor: pointer; box-shadow: 0 4px 15px rgba(79,70,229,.4);
  transition: all .2s; display: none; align-items: center; gap: 8px;
}
#btnInstall.show { display: flex; }
#btnInstall:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(79,70,229,.5); }
[data-theme="dark"] #btnInstall { box-shadow: 0 4px 15px rgba(124,124,248,.4); }

/* Better mobile layout */
@media (max-width: 600px) {
  .container { padding: 12px 10px 100px; }
  .header { padding: 16px 0 2px; }
  .header h1 { font-size: 1.25em; }
  .controls { padding: 10px 12px; gap: 6px; }
  .controls label { font-size: .78em; }
  .controls select, .controls button { padding: 6px 10px; font-size: .78em; }
  .card { padding: 18px 12px 14px; margin-bottom: 12px; border-radius: 10px; }
  .q-stem { font-size: .95em; margin-bottom: 16px; line-height: 1.7; }
  .option { padding: 11px 14px; font-size: .92em; }
  .actions { gap: 6px; }
  .actions button { padding: 10px 20px; font-size: .88em; }

  .stats { font-size: .78em; gap: 10px; flex-wrap: wrap; }
  #btnTheme { top: 8px; right: 8px; font-size: 1em; padding: 4px 10px; }
  .controls .spacer { display: none; }
}

@supports (padding-bottom: env(safe-area-inset-bottom)) {
  .container { padding-bottom: calc(80px + env(safe-area-inset-bottom)); }
  #btnInstall { bottom: calc(20px + env(safe-area-inset-bottom)); }
}

@media (pointer: coarse) {
  .option { min-height: 48px; }
  .judge-btn { min-height: 60px; }
  .actions button { min-height: 44px; }
  select, button { min-height: 40px; }
}

.card { user-select: none; -webkit-user-select: none; }

/* Update banner */
#updateBanner {
  display: none; background: var(--accent); color: #fff;
  text-align: center; padding: 10px 16px; font-size: .88em;
  cursor: pointer; border-radius: 0 0 var(--radius) var(--radius);
  margin-bottom: 8px; position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,.15);
}
#updateBanner.show { display: block; }
#updateBanner a { color: #fff; font-weight: 700; }
[data-theme="dark"] #updateBanner { background: #7c7cf8; }


/* Fill-in-the-blank */
.fill-area { line-height: 1.8; font-size: .95em; }
.fill-input { width: 120px; padding: 4px 8px; border: 2px solid #d1d5db; border-radius: 6px; font-size: .9em; font-family: inherit; margin: 0 4px; }
.fill-input:focus { border-color: var(--accent); outline: none; }
.fill-input:disabled { background: #f9fafb; color: #888; }
.tag-fill { background: #ecfdf5; color: #059669; }
.tag-glossary { background: #fef3c7; color: #d97706; }
.tag-qa { background: #ede9fe; color: #7c3aed; }
/* Self-assessment */
.self-assess-area { margin-top: 12px; }
.btn-reveal:hover { background: var(--accent-light); }

/* Question Picker Panel */
#pickerOverlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: var(--bg); z-index: 1000; flex-direction: column;
}
#pickerOverlay.show { display: flex; }
.picker-header {
  padding: 10px 14px; background: var(--card-bg); border-bottom: 1px solid var(--border);
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
}
.picker-header h3 { font-size: 0.95em; margin-right: auto; }
.picker-filters {
  display: flex; gap: 5px; flex-wrap: wrap; padding: 6px 12px;
  background: var(--bg); border-bottom: 1px solid var(--border); align-items: center;
}
.picker-filters button {
  padding: 3px 10px; border-radius: 12px; border: 1.5px solid var(--border);
  background: var(--card-bg); font-size: 0.75em; cursor: pointer; font-family: inherit;
  white-space: nowrap; color: var(--text-secondary);
}
.picker-filters button.on { background: var(--accent); color: #fff; border-color: var(--accent); }
.picker-filters select {
  padding: 3px 8px; border-radius: 12px; border: 1.5px solid var(--border);
  font-size: 0.75em; background: var(--card-bg); font-family: inherit; color: var(--text);
}
.picker-list {
  flex: 1; overflow-y: auto; padding: 4px 0;
  -webkit-overflow-scrolling: touch;
}
.picker-item {
  display: flex; align-items: flex-start; gap: 6px; padding: 7px 12px;
  border-bottom: 1px solid #f3f4f6; cursor: pointer; font-size: 0.8em;
}
.picker-item:active { background: #f0f0ff; }
.picker-item input[type=checkbox] { margin-top: 2px; flex-shrink: 0; width:16px; height:16px; }
.picker-item .pi-id { color: var(--accent); font-weight: 600; min-width: 28px; font-size: 0.9em; }
.picker-item .pi-tag { font-size: 0.7em; padding: 1px 5px; border-radius: 8px; flex-shrink: 0; }
.picker-item .pi-stem { flex: 1; line-height: 1.35; color: var(--text); }
.picker-footer {
  padding: 10px 14px; background: var(--card-bg); border-top: 1px solid var(--border);
  display: flex; gap: 8px; align-items: center;
}
.picker-footer .sel-num { font-weight: 700; font-size: 0.9em; min-width: 60px; }
.picker-footer button {
  padding: 7px 20px; border-radius: 8px; border: none; font-size: 0.85em;
  font-weight: 600; cursor: pointer; font-family: inherit;
}
.picker-footer .btn-start { background: var(--accent); color: #fff; }
.picker-footer .btn-close { background: var(--border); color: var(--text-secondary); }

</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

化作用：铵氧化成硝酸的微生物学过程�?},{"id":614,"type":"glossary","chapter":"微生物的代谢","stem":"反硝化作�?,"answer":"微生物还原NO3－成气态氮的过程。即硝酸盐的异化还原�?},{"id":615,"type":"glossary","chapter":"微生物的代谢","stem":"化学渗透学�?chemiosmotic hypothesis)","answer":"在氧化磷酸化过程中，通过呼吸链有关酶系的作用，可将底物分子上的质子从细胞�?(或线粒体�?的内侧传递到膜的外侧，从而造成膜两侧质子分布不均匀，此即质子动 势，再由它推动ATP的合成。化学渗透学说由英国学者P. Mitchell�?961年提出�?},{"id":616,"type":"glossary","chapter":"微生物的代谢","stem":"无氧呼吸(anaerobic respiration)","answer":"无氧呼吸又称厌氧呼吸。一类呼吸链末端的氢受体为外源无机氧化物或有机氧化物�?生物氧化。因而是在无氧条件下进行的、产能效率较低的特殊呼吸。其特点是葡萄糖 等底物按常规途径脱氢后，经呼吸链递氢(或电�?，最终由氧化态的无机�?NO3¯�?SO42¯�?或有机物受氢，并完成氧化磷酸化产ATP功能。根据末端受氢体的种类又�?分为硝酸盐呼吸、硫酸盐呼吸、硫呼吸、铁呼吸、碳酸盐呼吸或延胡索酸呼吸等�?},{"id":617,"type":"glossary","chapter":"微生物的代谢","stem":"硝酸盐呼�?ni tra te respiration)","answer":"硝酸盐呼吸又称反硝化作用。无氧呼吸的一种。是在无氧条件下，某些兼性厌氧菌�?用硝酸盐作为呼吸链的最终氢受体，使硝酸盐还原成亚硝酸盐、NO、N20或N2的过�?�?},{"id":618,"type":"glossary","chapter":"微生物的代谢","stem":"碳酸盐呼�?carbonate respiration) 无氧呼吸的一种。一类以CO2或重碳酸盐作为呼吸链未端氢受体的生物氧化产能过程 。根据其还原产物的不同可分两�?,"answer":"①由专性厌氧菌---- 产甲烷菌产生甲烷的碳酸盐呼吸；②由专性厌氧菌---- 产乙酸菌产生乙酸的碳酸盐呼吸�?},{"id":619,"type":"glossary","chapter":"微生物的代谢","stem":"发酵(fermentation)","answer":"在无氧等外源氢受体的条件下，产能底物在脱氢后所产生的还原力[H]未经呼吸连的 传递而直接由某一内源性中间代谢物接受，从而实现底物水平磷酸化产能的一类生�?氧化反应。广义的发酵也指任何利用好氧性微生物或厌氧性微生物来生产有用代谢产 物或食品、饮料的一类生产方式�?},{"id":620,"type":"glossary","chapter":"微生物的代谢","stem":"同型乳酸发酵(homolactic fermentation)","answer":"同型乳酸发酵是一个分子葡萄糖经EMP途径后仅产生两分子乳酸的发酵�?},{"id":621,"type":"glossary","chapter":"微生物的代谢","stem":"异型乳酸发酵(heterolactic fermentation)","answer":"异型乳酸发酵是葡萄糖经HMP途径发酵后，除产生乳酸外，还产生乙醇、乙酸和CO2�?多种发酵产物的发酵�?},{"id":622,"type":"glossary","chapter":"微生物的代谢","stem":"次生代谢�?secondary metabolite)","answer":"某些微生物生长到稳定期前后，以结构简单、代谢途径明确、产量较大的初生代谢�?物作前体，通过复杂的次生代谢途径而合成的各种结构复杂的化合物，称为次生代�?物。与初生代谢物不同，次生代谢物一般具有分子结构复杂，代谢途径独特，在生长 后期合成，产量较低，生理功能不很明确，以及其合成一般受质粒控制等特点�?},{"id":623,"type":"glossary","chapter":"微生物的生长","stem":"二次生长现象","answer":"当培养基中同时含有速效碳源（或氮源）和迟效碳源（或氮源）时，微 生物在生长过程中先利用完速效碳源（或氮源）后，再利用迟效碳源（或氮源）而出 现两次生长的现象，称为二次生长现象�?},{"id":624,"type":"glossary","chapter":"微生物的生长","stem":"平板菌落计数�?colony-coun ting method)","answer":"平板菌落计数法是活微生物个体数的常用计数法之一。把一定量稀释菌液浇注或涂布 在固体培养基平板�?�?，经培养后，每一活细胞就形成一个单菌落，依菌落形成�?位数(cfu)乘以稀释度即可求得试样中所含的活菌数�?},{"id":625,"type":"glossary","chapter":"微生物的生长","stem":"同步生长(synchronous growth)","answer":"同步生长是通过获得同步培养物的手段，使微生物细胞群体内的各个体都处于同一�?胞分裂周期的特殊生长状态�?},{"id":626,"type":"glossary","chapter":"微生物的生长","stem":"典型生长曲线(typical growth curve)","answer":"定量描述等容积液体培养基中微生物群体生长规律的一条实验曲线，称生长曲线。若 接种的是少量纯种单细胞微生物，则其生长曲线会显示出四个明显生长期，此即典�?生长曲线�?},{"id":627,"type":"glossary","chapter":"微生物的生长","stem":"连续培养(continuous culture)","answer":"连续培养又称开放培养。当微生物以单批培养方式培养到指数期的后期时，一方面�?一定速度连续流入新鲜培养基和新鲜空气(指对好氧�? ，并立即搅拌均匀，同时利用溢流方式连续不断流出培养物，使培养器内微生物长�?处在适宜的培养基中连续保持指数期生长，借以提高微生物的生长和代谢效率�?},{"id":628,"type":"glossary","chapter":"微生物的生长","stem":"生长温度三基�?three cardinal point of growth temperature)","answer":"生长温度三基点指某微生物生长温度的三个重要指标，即最低生长温度、最适生长温 度和最高生长温度�?},{"id":629,"type":"glossary","chapter":"微生物的生长","stem":"兼性厌氧茵(facultative anaerobes)","answer":"兼性厌氧菌是一类主要生长在有氧条件下也可在无氧条件下生长的微生物。特点是�?有氧下借呼吸产能，而在无氧条件下可借发酵或无氧呼吸产能；细胞含超氧化物歧化 �?SOD)和过氧化氢酶。例如一些酵母菌和许多细菌等�?},{"id":630,"type":"glossary","chapter":"微生物的生长","stem":"耐氧�?aerotolerant anaerobes)","answer":"耐氧菌即耐氧性厌氧菌的简称。一类可在有氧条件下正常生长却不需氧，而仅借发�?和底物水平磷酸化产能的微生物。其细胞内存在超氧化物歧化酶和过氧化物酶。例�?许多乳酸细菌�?},{"id":631,"type":"glossary","chapter":"微生物的生长","stem":"巴氏消毒�?pasteuriza tion)","answer":"巴氏消毒法是由巴斯德发明的一种低温湿热灭菌法，一般在60-85°C下处�?0min �?.5s，主要用于牛奶、果酒等液态风味食品的消毒�?},{"id":632,"type":"glossary","chapter":"微生物的生长","stem":"间歇灭菌�?fractional sterilization)","answer":"一种适用于不耐热培养基的灭菌方法。一般将培养基放�?00°C下蒸�?5min，然后置 37°C下过�?诱使残留芽胞发芽) ，次日再重复蒸煮、过夜，如此重复3d即可�?},{"id":633,"type":"glossary","chapter":"微生物的生长","stem":"石炭酸系�?phenol coefficient)","answer":"在一定时间内，某化学药剂能杀死全部供试菌的最高稀释度与达到同效的石炭�?(苯酚)的最高稀释度之比，称为石炭酸系数。一般规定处理时间为10min，供试菌�?伤寒沙门氏菌�?},{"id":634,"type":"glossary","chapter":"微生物的生长","stem":"抗代谢物(antimetabolite)","answer":"抗代谢物又称代谢拮抗物或代谢类似物。一类在化学结构上与细胞内必要代谢物的结 构相似，并可竞争性地干扰正常代谢活动的化学物质。它们具有良好的选择毒力，故 可用作化学治疗剂。如磺胺类药物等�?},{"id":635,"type":"glossary","chapter":"微生物的生�?,"stem":"微生物生态学(microbial ecology)","answer":"微生物生态学(microbial ecology)"},{"id":636,"type":"glossary","chapter":"微生物的生�?,"stem":"水体自净作用(water self-cleaning)","answer":"在自然条件下，快速流动、溶氧量高的水体，由于其中发生的一系列生物学和生物�?学作用，尤其是好氧菌对有机物的降解和氧化，原生动物对细菌的吞噬，藻类对无�?元素的吸收利用，以及浮游动物和一系列原生动物通过食物链对有机物的摄取和浓�?等作用，保证了水体的洁净，称水体的自净作用�?},{"id":637,"type":"glossary","chapter":"微生物的生�?,"stem":"条件致病�?oppotunist pathogen)","answer":"在微生态失调状态下，原先属于正常菌群中的一些非致病�?如大肠杆菌、脆弱拟�?菌或白假丝酵母等)因伺机大量繁殖或转移至其他部位而引起宿主致病者，称条件致 病菌�?},{"id":638,"type":"glossary","chapter":"微生物的生�?,"stem":"微生态制�?microecologics)","answer":"微生态制剂是依据微生态学理论而制成的含有有益菌的活菌制剂。它具有维持宿主�?微生态平衡、调整宿主的微生态失调等保健功能�?},{"id":639,"type":"glossary","chapter":"微生物的生�?,"stem":"互生(metabiosis)","answer":"互生指两种可独立生活的生物，当它们在一起生活时，通过各自的代谢活动而有利于 对方或偏利于一方的相互关系�?},{"id":640,"type":"glossary","chapter":"微生物的生�?,"stem":"共生(symbiosis)","answer":"共生指两种生物共居在一起，相互分工合作，相依为命，甚至达到难分难解、合二为 一的极其紧密的一种相互关系。如菌藻共生的地衣，豆科植物与细菌共生而形成的�?瘤等�?},{"id":641,"type":"glossary","chapter":"微生物的生�?,"stem":"寄生(parasi tism)","answer":"寄生一般指一种小型生物生活在另一种较大型生物体内(包括细胞�?或体表，从后�?中夺取营养并进行生长繁殖，同时使后者蒙受损害甚至被杀死的一种相互关系�?},{"id":642,"type":"glossary","chapter":"微生物的生�?,"stem":"拮抗(antagonism)","answer":"拮抗又称抗生。指两种生物生活在一起时，一种生物产生的特定代谢产物可抑制它�?生物生长发育甚至杀死它们的一种相互关系。例如，抗生素产生菌对抗生素敏感菌， 以及产酸菌对酸敏感菌的关系等�?},{"id":643,"type":"glossary","chapter":"微生物的生�?,"stem":"猎食(predatism)","answer":"猎食一般指一种大型生物直接捕捉、吞食另一种小型生物以满足其营养需要的相互�?系。如原生动物捕食细菌或藻类等�?},{"id":644,"type":"glossary","chapter":"微生物的遗传和变�?,"stem":"饰变(modifica tion)","answer":"饰变是一种不涉及遗传物质结构或数量变化，只发生在转录、转译水平上的表型变�?。其特点是整个群体中的几乎每一个体都发生同样的变化；性状变化的幅度小；饰�?后的性状是不遗传的�?},{"id":645,"type":"glossary","chapter":"微生物的遗传和变�?,"stem":"F质粒(F plasmid)","answer":"F质粒又称F因子或致育因子。是大肠杆菌等细菌决定其性别并有转移能力的质粒�?},{"id":646,"type":"glossary","chapter":"微生物的遗传和变�?,"stem":"Ti质粒(Ti plasmid)","answer":"Ti质粒即诱癌质粒或冠瘿质粒。一种存在于根癌土壤杆菌(Agrobacterium tumefaciens)中的质粒。可与植物根部细胞的核基因组整合，并通过产生冠瘿碱而使 其致癌。在植物基因工程中，Ti质粒是一种十分有用的外源基因载体�?},{"id":647,"type":"glossary","chapter":"微生物的遗传和变�?,"stem":"突变�?mutation rate)","answer":"突变率是某一细胞(或病毒粒)在每一世代中发生性状突变的概率；也可用某一单位�?体在每一世代中产生突变株的数目来表示�?},{"id":648,"type":"glossary","chapter":"微生物的遗传和变�?,"stem":"转化( transformation)","answer":"受体菌直接吸收供体菌的DNA片段而获得后者部分遗传性状的变异现象，称为转化�?},{"id":649,"type":"glossary","chapter":"微生物的遗传和变�?,"stem":"转导( transduction)","answer":"转导是通过缺陷噬菌体的媒介，把供体细胞中小片段DNA携带到受体细胞中，通过�?换和整合，使后者获得前者部分遗传性状的现象�?},{"id":650,"type":"glossary","chapter":"微生物的遗传和变�?,"stem":"接合(conjugation，mating)","answer":"雄性供体茵通过性菌毛与雌性受体菌直接接触，并把F质粒或其携带的部分或全部�?基因组传递给受体菌，使后者通过基因重组而获得若干新遗传性状的现象，称为接合 �?},{"id":651,"type":"glossary","chapter":"微生物的遗传和变�?,"stem":"流产转导(abortive transduction)","answer":"经转导噬菌体的媒介而获得供体菌DNA片段的受体菌，若此外源DNA在其内既不进行交 换、整合和复制，也不迅速消失，而能表现稳定的转录、转译和性状表达的现象，�?为流产转导。其特征是在选择性培养基上形成一微小菌落�?},{"id":652,"type":"glossary","chapter":"微生物的遗传和变�?,"stem":"溶源转变(lysogenic' conversion)","answer":"因温和噬菌体感染其宿主，而使宿主细胞在发生溶源化时获得了除对同种噬菌体免�?性以外的新遗传性状的现象，称溶源转变。例如，白喉棒杆菌因β温和噬菌体感染�?产白喉毒素等�?},{"id":653,"type":"glossary","chapter":"微生物的遗传和变�?,"stem":"F+菌株(F+ strain)","answer":"F+菌株即\"雄性\"菌株。指某些细菌细胞内存在一个至几个F质粒，并在细胞表面着�?一条至几条性菌毛，可向F-菌株传递F质粒或部分遗传性状的菌株�?},{"id":654,"type":"glossary","chapter":"微生物的遗传和变�?,"stem":"F-菌株(F- strain)","answer":"F菌株即\"雌性\"菌株。指某些细菌中与F+菌株相对应的、细胞中无F质粒、细胞表面无 性菌毛的菌株。它可分别接受来自F+、F'或Hfr菌株的F质粒、F'质粒或Hfr遗传因子 �?},{"id":655,"type":"glossary","chapter":"微生物的遗传和变�?,"stem":"F'菌株(F' strain)","answer":"F'菌株即带有F'质粒的菌株。由Hfr菌株中的F质粒通过不正常切离脱离核染色体组�?形成�?},{"id":656,"type":"glossary","chapter":"微生物的遗传和变�?,"stem":"Hfr菌株(Hfr strain)","answer":"Hfr菌株即高频重组菌株。某些细�?如大肠杆�?的F+菌株中的F因子由游离态转变成 整合态后即称为Hfr菌株。当它与F-菌株接合后，可由F因子携带较多基因至F- 菌株，从而使后者重组频率大为提高，故名�?},{"id":657,"type":"glossary","chapter":"微生物的遗传和变�?,"stem":"冷冻干燥保藏�? lyophilization) 冷冻干燥保藏法又称冷冻真空保藏法。一种常用的有效保藏菌种的方法。它采用低温 、干燥、缺氧和添加保护剂等因素，使菌种保藏时间可达10年以上。方法要点是","answer":"�?种细胞或子包子用脱脂牛奶等保护剂混匀，放入安培管中，置一70°C下冻结后，用�?空法使冰升华后去除，然后熔封，并在低温下保存�?},{"id":658,"type":"glossary","chapter":"微生物的遗传和变�?,"stem":"甘油悬液保藏�?glycerin preservation)","answer":"简便菌种保藏方法之一。该法是将细菌或酵母悬液与无菌甘油混匀(最终浓度为15%- 50%)后，置一70°C低温下保藏。保藏期�?0年�?},{"id":659,"type":"glossary","chapter":"细菌和古生菌","stem":"原核生物(prokaryote) 原核生物是一大类细胞微小、只有原始细胞核(核区)的单细胞生物,包括真细菌和�?生菌两大类。原核生物与真核生物的主要区别是","answer":"原核生物①细胞核无核膜包裹； ②缺少由单位膜分隔而成的细胞器；③核糖体为70S型�?},{"id":660,"type":"glossary","chapter":"细菌和古生菌","stem":"细菌(bacteria)","answer":"细菌是一大类细胞细而短、结构简单、胞壁坚韧、多以二分裂方式繁殖和水生性较�?的原核生物�?},{"id":661,"type":"glossary","chapter":"细菌和古生菌","stem":"革兰氏染色法(Gram's staining)","answer":"由丹麦学者C. Gram发明的一种细菌鉴别性染色法。任何细菌经结晶紫溶液染色、碘液媒染、乙醇脱 色和沙黄(番红)复染后，会被染成紫色或红色，凡染成紫色者称革兰氏阳性细菌，�?成红色者则为革兰氏阴性细菌�?},{"id":662,"type":"glossary","chapter":"细菌和古生菌","stem":"脂多�?lipopolysaccharide, LPS)","answer":"脂多糖是位于G¯细菌细胞壁外膜层的一种较�?8-10 nm)的类脂多糖类化合物，由类脂A、核心多糖和O- 特异侧链三部分构成，它是G¯细菌致病物质---内毒素的物质基础�?},{"id":663,"type":"glossary","chapter":"细菌和古生菌","stem":"周质空间(periplasmic space)","answer":"周质空间一般指位于G¯细菌细胞壁外膜与细胞膜之间的狭窄空间，呈胶状，内含各�?周质蛋白，包括多种酶类和一些受体蛋白等�?},{"id":664,"type":"glossary","chapter":"细菌和古生菌","stem":"古生�?Archaea)","answer":"古生菌又称古菌或古细菌，是一类在进化早期就与真细菌和真核生物的远祖相互独�?演化的原核生物，主要包括一些与地球早期环境有联系的极端微生�?嗜热菌、嗜�?菌、嗜盐菌�?和产甲烷菌等。主要特点为细胞壁无肽聚糖，细胞膜脂由醚键连接， 以及与真细菌有明显差别的16S rRNA序列等�?},{"id":665,"type":"glossary","chapter":"细菌和古生菌","stem":"L型细�?L form of bacteria)","answer":"L型细菌是在实验室或宿主体内通过自发突变而形成的遗传型稳定的一类缺壁细菌�?因最初是在英国的李斯�?Lister)研究所发现了缺壁细菌念珠状链杆菌CStreptobac illus moniliformis)，故称L型细菌。目前也有人把细菌的原生质体或球状体称作\"L型细�?\"�?},{"id":666,"type":"glossary","chapter":"细菌和古生菌","stem":"细菌原生质体(protoplast of bacteria)","answer":"在人为条件下，用溶菌酶去除细菌现成细胞壁，或用青霉素抑制正在生长繁殖细菌�?的新生细胞壁的合成，由此形成的仅由一层细胞膜包裹着的圆球状细胞称为细菌原生 质体，一般由G+细菌形成。原生质体柔软、脆弱，对渗透压敏感，无繁殖能力，在�?适条件下可再生出新细胞壁，并恢复其繁殖能力�?},{"id":667,"type":"glossary","chapter":"细菌和古生菌","stem":"球状�?sphaeroplast)","answer":"球状体又称原生质球，指还残留着部分细胞壁的原生质体。G¯细菌因其细胞壁成分复 杂，并非仅肽聚糖单一成分，故一般只形成球状体�?},{"id":668,"type":"glossary","chapter":"细菌和古生菌","stem":"�?β –羟基丁�?poly-,B-hydroxybutyate, PHB)","answer":"�? β–羟基丁酸是一种存在于某些细菌(固氮菌、产碱菌和肠杆菌�?细胞质内的一类颗�?状内含物，由许多羟基丁酸分子聚合而成，具有贮存能源、碳源和降低细胞内渗透压 等功能。可用于制造可降解塑料�?},{"id":669,"type":"glossary","chapter":"细菌和古生菌","stem":"异染�?metachromatic granules)","answer":"异染粒又称迂回体，是细菌细胞质内的无机偏磷酸盐聚合物类内含物，具有贮藏磷�?素和能源等功能。在自喉棒杆菌和结核分校杆菌中易见到�?},{"id":670,"type":"glossary","chapter":"细菌和古生菌","stem":"磁小�?magnetosome)","answer":"磁小体是一种存在于某些趋磁细菌细胞内的Fe3O4小颗粒，每个细胞�?- 0颗，外有一层磷脂、蛋白质或糖蛋白膜包裹，无毒，具导向功能，使细胞游向有利 的泥水界面的微氧环境处生活�?},{"id":671,"type":"glossary","chapter":"细菌和古生菌","stem":"糖被(glycocalyx)","answer":"糖被是包被于某些细菌细胞壁外的一层厚度不定的胶状物，其成分一般为多糖。因�?度不同等原因，可把糖被分成荚膜、粘液层或菌胶团等。糖被的生理功能是保护细�?、贮藏养料、附着和堆积代谢废物等�?},{"id":672,"type":"glossary","chapter":"细菌和古生菌","stem":"细菌鞭毛(flagellum of bacteria)","answer":"长在某些细菌表面的长丝状、波曲的蛋白质附属物，数目为一条至数十条，具有运动 功能。由基体、钩形销和鞭毛丝三部分组�?以旋转方式推动细胞运动的�?},{"id":673,"type":"glossary","chapter":"细菌和古生菌","stem":"性毛(pilus, sex pilus)","answer":"性毛又称性菌毛。构造和成分与菌毛相同，但比菌毛长而粗。每个细菌一般仅着生一 条至少数几条性毛。多见于G¯细菌的雄性菌株上，主要功能是向雌性菌株传递遗传物 质�?},{"id":674,"type":"glossary","chapter":"细菌和古生菌","stem":"芽胞(endospore)","answer":"某些细菌在其生长发育后期,在细胞内形成的一个圆形或椭圆形、厚壁、含水量低�?抗逆�?抗热、抗药物、抗辐射�?极强的休眠体。产芽胞细菌的种类不多，常见于好 氧的芽胞杆菌�?Bacillus)和厌氧的梭菌�? Clostridium)中�?},{"id":675,"type":"glossary","chapter":"细菌和古生菌","stem":"伴胞晶体(parasporal crystal)","answer":"苏云金杆菌等少数芽胞杆菌在其形成芽胞的同时，会在芽胞旁形成一颗菱形或双锥�?的碱溶性蛋白晶�?δ内毒�?，称伴胞晶体。它对约200种昆虫尤其是鳞翅目幼虫有�?杀作用，故可制成细菌杀虫剂�?},{"id":676,"type":"glossary","chapter":"细菌和古生菌","stem":"菌落(colony)","answer":"在固体培养基表面或内层，以一个至少数几个微生物细胞为中心而繁殖成的一堆肉�?可见的、有一定形态构造等特征的子细胞集团称为菌落。菌落特征是菌种鉴定中的�?要指标，也可用于菌种的分离、纯化、计数、育种和保藏等实际工作中�?},{"id":677,"type":"glossary","chapter":"细菌和古生菌","stem":"放线�?actinomycetes)","answer":"放线菌是一类以菌丝状生长并以子包子繁殖的陆生性较强的原核生物。属革兰氏阳�?菌。广泛分布于含水量较低、有机物较丰富和呈微碱性的土壤中。它们是抗生素的�?要产生菌�?},{"id":678,"type":"glossary","chapter":"细菌和古生菌","stem":"异形�?heterocyst)","answer":"异形胞是存在于一些丝状蓝细菌中的形大、壁厚、专司固氮功能的特化细胞，数目少 而不定，位于细胞链的中间或末端。在鱼腥蓝细�?Anabaena)和念珠蓝细菌(Nostoc )中常见�?},{"id":679,"type":"glossary","chapter":"细菌和古生菌","stem":"支原�?mycoplasma)","answer":"支原体是一类无细胞壁、介于独立生活和细胞内寄生生活方式间的最小型原核生物�?形态易变。多数寄生、少数腐生。如肺炎支原体和生殖道支原体等�?},{"id":680,"type":"glossary","chapter":"细菌和古生菌","stem":"衣原�?Chlamydia)","answer":"衣原体是一类在真核细胞内营专性能量寄生的小型G¯原核生物，由我国微生物学家汤 飞凡�?956年首次自沙眼病灶中分离到�?},{"id":681,"type":"glossary","chapter":"真核微生�?,"stem":"真菌(fungi) 真菌是一类重要的真核微生物，特点","answer":"①无叶绿素，不能进行光合作用；②多数具有�?达的菌丝体；③细胞壁一般含几丁质；④营养方式为异养吸收型⑤以产生各种无性或�?性孢子方式进行繁殖；⑥陆生性较强�?},{"id":682,"type":"glossary","chapter":"真核微生�?,"stem":"酵母�?yeast) 酵母菌是能发酵糖类的各种单细胞真菌的俗称。通常具有五个特点","answer":"①一般为单细�?；②多数常出芽繁殖；③能发酵糖类产能；④细胞壁常含甘露聚糖；⑤常生活在含糖量�?高、酸度较大的水生环境中�?},{"id":683,"type":"glossary","chapter":"真核微生�?,"stem":"单细胞蛋�?single cell protein, SCP)","answer":"单细胞蛋白指可用工业方法大量生产的微生物细胞蛋白，尤其是酵母菌蛋白。由于单 细胞蛋白可用胺盐、硝酸盐等无机氮源或尿素通过微生物代谢而生产，故对补充动物 和人类蛋白质营养(食品、饲料、饵�?有重大的意义�?},{"id":684,"type":"glossary","chapter":"真核微生�?,"stem":"霉菌(mould, mold)","answer":"丝状真菌的俗称。因许多种可引起食物和工农业产品霉变，故称霉菌。通常指菌丝体 较发达，但又不产生大型肉质子实体结构的真菌�?},{"id":685,"type":"glossary","chapter":"真核微生�?,"stem":"酵母纤维�?yeast cellulose)","answer":"酵母纤维素是酵母菌细胞壁的主要成分，构造呈三明治状---- 外层为甘露聚糖，内层为葡聚糖，中间夹着一层蛋白质。酵母纤维素可用蜗牛消化�?去除，从而使酵母细胞转变成酵母原生质体�?},{"id":686,"type":"glossary","chapter":"真核微生�?,"stem":"假菌�?pseudohyphae)","answer":"在良好营养和生长条件下，酵母菌生长迅速，几乎在所有营养细胞上都长出芽体。如 果长出的一连串芽体与母细胞大小相近又不立即分离，其间仅以较小的面积相连，这 种藕节状的细胞串称假菌丝�?},{"id":687,"type":"glossary","chapter":"真核微生�?,"stem":"2μm质粒(2μm plasmid)","answer":"存在于酿酒酵母细胞核内的一个闭合环状超螺旋状DNA分子，长�?μm，故名。一般每 个细胞含60- 100个，行严紧型复制，生物学功能不明。可用作酵母菌遗传操作中外源基因的有�?载体�?},{"id":688,"type":"glossary","chapter":"真核微生�?,"stem":"假根(rhizoid)","answer":"假根是根霉属等低等真菌的匍甸菌丝与固体基质相接触处分化出来的根状构造，具有 固着和吸取养料等功能�?},{"id":689,"type":"glossary","chapter":"真核微生�?,"stem":"吸器(haustorium)","answer":"吸器是一些专性植物寄生真菌所产生的特化菌丝，只长于蔓延在宿主细胞间隙的营�?菌丝上，呈指状、球状或丝状，可侵入宿主细胞内吸取其养分而不使其致死�?},{"id":690,"type":"glossary","chapter":"真核微生�?,"stem":"附着�?adhesi ve cell)","answer":"一些植物寄生真菌的芽管或老龄菌丝顶端发生膨大、分泌黏状物，借以牢固地黏附于 宿主的表面，此即附着胞。在其上可形成纤细的针状菌丝以侵入宿主细胞吸取养料�?},{"id":691,"type":"glossary","chapter":"真核微生�?,"stem":"子实�?fruiting body, sporocarp)","answer":"子实体是真菌气生菌丝特化后的组织，有一定形状和构造，在其内部或表面可产生�?无性孢子或有性孢子�?},{"id":692,"type":"glossary","chapter":"真核微生�?,"stem":"分生孢子�?conidial head)","answer":"分生孢子头又称分生孢子穗。曲霉等真菌的分生孢子梗发生顶端膨大并经分化后适于 产生大量分生孢子的一种结构。一般由顶囊、小梗和分生于包子链组成。其特征多样 ，可用作菌种分类鉴定中的重要形态学指标�?},{"id":693,"type":"glossary","chapter":"真核微生�?,"stem":"孢子�?sporangium)","answer":"孢子囊是在根霉、毛霉等少数真菌中，长在孢囊梗顶端的一种囊状构造。形状多样， 内产无性的孢囊孢子。是菌种分类鉴定中的重要形态学指标�?},{"id":694,"type":"glossary","chapter":"真核微生�?,"stem":"分生孢子(conidium)","answer":"分生孢子是一类在真菌特化的产孢细胞上形成的不运动孢子，形态多样，数量众多�?是多数真菌的无性繁殖体。它的特征是真菌分类鉴定中的重要形态学指标。在实验�?中，分生孢子可用于菌种分离、筛选、保藏、育种以及接种、扩大培养等方面�?},{"id":695,"type":"glossary","chapter":"病毒","stem":"病毒(virus)","answer":"病毒是一类由核酸和蛋白质或加上其他少数成分组成的非细胞超显微生物，其本质�?一类可在宿主细胞内进行自身复制的遗传因�?DNA或RNA)。它们能以感染态和非感�?态两种状态存在�?},{"id":696,"type":"glossary","chapter":"病毒","stem":"病毒包含�?viral inclusion body)","answer":"病毒包含体是宿主细胞被病毒感染后，在细胞内产生的一种有一定形态的病变结构�?不同病毒可引起不同的包含体，它们在形成部�?细胞质或细胞�?、染色特性、大�?、形状、数量和含病毒粒多少等方面的差别，是病毒病诊断时的重要指标�?},{"id":697,"type":"glossary","chapter":"病毒","stem":"病毒�?virion)","answer":"病毒粒是成熟的、结构完整且有感染力的单个病毒�?},{"id":698,"type":"glossary","chapter":"病毒","stem":"噬菌�?plaque)","answer":"将噬菌体稀释液接种于布满敏感细菌的平板上后，经一定时间培养，以每一母噬菌体 粒子为中心而形成的一个圆形、透明和有一定特征的溶菌区域，称噬菌斑。可用于�?菌体的鉴定、分离和计数�?},{"id":699,"type":"glossary","chapter":"病毒","stem":"腺病�?adenovirus)","answer":"一类二十面对称、球状的DNA病毒，能侵染哺乳动物或禽类等动物的呼吸道、眼结膜 和淋巴组织等。只能在人的组织细胞上培养�?},{"id":700,"type":"glossary","chapter":"病毒","stem":"噬菌�?phage, bacteriophage)","answer":"噬菌体是原核生物病毒的总称，一般多指噬细菌体和噬放线菌体。分布广泛，种类�?多。主要形态有蝌蚪状收缩尾、蝌蚪状非收缩长尾或短尾，球状大顶衣壳粒或小顶衣 壳粒，以及丝状等六种�?},{"id":701,"type":"glossary","chapter":"病毒","stem":"烈性噬菌体(virulent phage)","answer":"烈性噬菌体是在短时间内能连续完成五阶段生活史，并通过宿主细胞裂解而实现其�?殖的噬菌体�?},{"id":702,"type":"glossary","chapter":"病毒","stem":"一步生长曲�?定量描述毒性噬菌体生长规律的实验曲线称为一步生长曲线。该种曲线反映出三个�?要特征参�?,"answer":"潜伏期、裂解期、裂解量�?},{"id":703,"type":"glossary","chapter":"病毒","stem":"温和噬菌�?temperate phage)","answer":"温和噬菌体是一类在通常情况下只引起宿主细胞溶源化而不引起裂解的噬菌体。侵�?宿主后，其基因组通过与宿主基因组整合，并随后者的复制而进行同步复制�?},{"id":704,"type":"glossary","chapter":"病毒","stem":"裂解性循�?lytic cycle)","answer":"裂解性循环又称裂解性周期。指每一代烈性噬菌体所经历的繁殖过程。包括吸附、侵 入、增殖、成熟和裂解五个阶段�?},{"id":705,"type":"glossary","chapter":"病毒","stem":"溶源性循�?lysogenic cycle)","answer":"溶源性循环指温和噬菌体的生活史。它们侵入宿主细胞后，可引起溶源化，即噬菌体 基因组整合到宿主基因组上，并以原噬菌体状态与宿主长期并存、同步复制，只在�?发或诱导条件下才转入增殖、成熟和裂解阶段，完成其全部生活史�?},{"id":706,"type":"glossary","chapter":"病毒","stem":"自外裂解(lysis from without)","answer":"大量噬菌体吸附在同一宿主细胞表面并释放众多的溶菌酶，最终因这一外在原因而导 致细胞裂解的现象，称为自外裂解�?},{"id":707,"type":"glossary","chapter":"病毒","stem":"裂解�?burst size)","answer":"裂解量是病毒一步生长曲线中的一个参数，指每一细胞裂解后平均释放的子代噬菌�?粒子数�?},{"id":708,"type":"glossary","chapter":"病毒","stem":"效价(titre, titer)","answer":"效价又称噬菌斑形成单位数(pfu)或感染中心数。指每毫升试样中所含有的具侵染�?的噬菌体粒子数�?},{"id":709,"type":"glossary","chapter":"病毒","stem":"隐晦�?eclipse phase)","answer":"在噬菌体的一步生长曲线中，在其潜伏期前期的一个用人为方法裂解宿主细胞所产生 的裂解液无侵染力的时期，即隐晦期。这时，噬菌体的核酸和蛋白质正处于合成而未 进行装配的阶段�?},{"id":710,"type":"glossary","chapter":"病毒","stem":"溶源�?lysogeny)","answer":"温和噬菌体侵入宿主细胞后，仅以原噬菌体状态存在而不引起宿主细胞裂解的现象， 称为溶源性�?},{"id":711,"type":"glossary","chapter":"病毒","stem":"λ噬菌�? bacteriophage λ)","answer":"λ噬菌体是大肠杆菌的一种温和噬菌体。含dsDNA，蝌蚪形，有非收缩性长尾。可改建 成重要的基因工程载体，如凯隆载体和科斯质粒等�?},{"id":712,"type":"glossary","chapter":"病毒","stem":"类病�?viroid)","answer":"类病毒是一类只含RNA一种分�?专性寄生在活细胞内的分子病原体。例如马铃薯纺锤 形块茎病类病毒等�?},{"id":713,"type":"glossary","chapter":"病毒","stem":"拟病�?virusoid)","answer":"拟病毒是一类被真病毒包裹的缺陷类病毒，前者又称辅助病毒，后者又称病毒卫星�?例如绒毛烟斑驳病毒等�?},{"id":714,"type":"glossary","chapter":"病毒","stem":"朊病�?prion)","answer":"朊病毒是一类不含核酸的传染性蛋白质分子，以构象感应方式增殖。是羊瘙痒病、疯 牛病和人类克-雅氏病等的病原体�?},{"id":715,"type":"glossary","chapter":"微生物的营养","stem":"氨基酸自养微生物(amino acid autotrophs)","answer":"氨基酸自养微生物是能利用尿素、铵盐、硝酸盐或氮气作氮源，自行合成其所需氨基 酸的微生物�?},{"id":716,"type":"glossary","chapter":"微生物的营养","stem":"自养微生�?autotrophs)","answer":"自养微生物是一类不依赖任何有机物即可正常生长繁殖的微生物。根据其能源的不�?，可分光能自养微生物和化能自养微生物两大类�?},{"id":717,"type":"glossary","chapter":"微生物的营养","stem":"三功能营养物(trifunctional nutrient)","answer":"三功能营养物是可同时具有三种营养要素功能的营养物，如氨基酸和蛋白质既可作�?养微生物的氮源，也可作它们的碳源和能源�?},{"id":718,"type":"glossary","chapter":"微生物的营养","stem":"生长因子(growth factor)","answer":"生长因子是一类对调节微生物正常代谢所必需，但不能利用碳源、氮源自行合成的�?量有机物，主要是维生素类和若干嘌呤、嘧啶、卟啉和甾醇等有机物，有时也包括一 些氨基酸�?},{"id":719,"type":"glossary","chapter":"微生物的营养","stem":"促进扩散(facilitated diffusion)","answer":"细胞膜运送物质的方式之一。指溶质在运送过程中，必须借助存在于细胞膜上的底物 特异载体蛋白的协助，但不耗能的一类可加速扩散的运送方式�?},{"id":720,"type":"glossary","chapter":"微生物的营养","stem":"主动运�?active transport)","answer":"细胞膜运送物质的方式之一。指一类须提供能量，并通过细胞膜上特异性载体蛋白构 象的变化，而使膜外低浓度的溶质不断运人膜内的一种运送方式�?},{"id":721,"type":"glossary","chapter":"微生物的营养","stem":"基团转移(group translocation)","answer":"细胞膜运送物质的方式之一。指一类既需特异性载体蛋白的参与，又需耗能的一种物 质运送方式。特点是溶质在运送前后会发生分子结构的变化。例如糖类的运送�?},{"id":722,"type":"glossary","chapter":"微生物的营养","stem":"碳氮�?C/N ratio)","answer":"碳氮比是指在某一培养基配方中，碳源与氮源、含量的比例。严格地讲，应指在培�?基所含的碳源中的碳原子摩尔数与氮源中氮原子摩尔数之比�?},{"id":723,"type":"glossary","chapter":"微生物的营养","stem":"天然培养�?complex media)","answer":"天然培养基是一类利用动物体、植物体或微生物体包括用其提取物制成的培养基，其 特点是成分复杂、营养丰富，但不知其确切的化学组分，价格便宜，适合多种微生�?的生长繁殖或生产代谢产物之用�?},{"id":724,"type":"glossary","chapter":"微生物的营养","stem":"组合培养�?chemical defined media)","answer":"组合培养基又称合成培养基，是一类按微生物营养要求设计的用多种高纯化学试剂配 制成的培养基。优点是成分精确、重演性高，缺点是配制麻烦、价格较贵。主要适合 科学研究用�?},{"id":725,"type":"glossary","chapter":"微生物的营养","stem":"半固体培养基(semi-solid media)","answer":"通过向在液体培养基中加入少量凝固�?�?.5%琼脂)而配制成的半固态培养基。可�?于细菌运动力观察，厌氧菌的分离、培养和计数，菌种保藏，以及噬菌体效价测定等 �?},{"id":726,"type":"glossary","chapter":"微生物的营养","stem":"选择性培养基(selected media)","answer":"选择性培养基是一类根据某微生物的特殊营养要求或对某化学因素、物理因素的抗�?而设计的培养基。具有使混合菌样中的劣势菌变成优势菌的功能。广泛用于菌种筛�?等领域�?},{"id":727,"type":"glossary","chapter":"微生物的营养","stem":"鉴别性培养基(differential media)","answer":"鉴别性培养基是一类在成分中加有能与目的菌的无色代谢产物发生显色反应的指示�?，从而达到只需用肉眼辨别菌落颜色就能方便地从近似菌落中找出目的菌菌落的培养 基。如EMB培养基�?},{"id":728,"type":"qa","chapter":"原核微生�?,"stem":"细菌细胞壁的主要生理功能","answer":"a) 具有保护作用，能够提高细胞的机械强度，因而可以保护细胞免受机械损伤和渗透压 等外力的破坏�?b) 为细胞的生长、分裂和鞭毛运动所必需�?c) 与物质运输有关，作为细胞内、外物质运输的第一屏障，细胞壁对大分子物质有阻�?作用，但并不妨碍小分子物质的自由进出�?d) 决定细菌具有特定的抗原性、致病力以及对抗生素和噬菌体的敏感性�?},{"id":729,"type":"qa","chapter":"原核微生�?,"stem":"比较G+、G－和古生菌的假肽聚糖的结构差�?,"answer":"1）、G+肽聚糖单体是�? �?N-乙酰葡糖胺和N-乙酰胞壁酸两种糖通过β-1,4- 糖苷键组成的聚糖。② 四肽尾L-Ala+D-Glu+L-Lys+D-Ala；③ 肽桥5个Gly相连�?2）、G－和G+肽聚糖单体基本相同，区别在于G－的四肽尾第3个氨基酸是m-DAP而不�?L-Lys，且没有特殊的肽桥，只形成较为疏稀、机械强度较差的肽聚糖网套�?3）、古生菌的假肽聚糖单体为：N-乙酰葡糖胺和N- 乙酰塔罗糖醛酸交替连接而成的聚糖，肽尾由L-glu、L-ala和L- lys三个L型氨基酸组成，肽桥则由L-glu一个氨基酸组成�?},{"id":730,"type":"qa","chapter":"原核微生�?,"stem":"试述革兰氏染色的步骤、G+和G－细菌染色结果不同的原因是�?1）革兰氏染色的步�?i. 结晶紫对菌液涂片进行初染;（紫�? ii. 用碘溶液进行媒染（固定），染料和细胞间的结合得更牢�?紫色) iii. 用乙醇或丙酮进行冲洗脱色。（＋紫色，-无色�?iv. 用与结晶紫具有不同颜色的碱性染料复染。例如沙黄或番红。（＋紫色，－红色）","answer":"2）G+和G－细菌染色结果不同的原因�?革兰氏染色过程中,细菌用结晶紫染色�?再经碘液媒染可以提高染料的滞留性。当用乙 醇对G+细菌进行脱色处理时，由于乙醇会使厚肽聚糖层的孔隙收缩，因此在短时间的�?色过程中，结晶紫/碘的复合物被滞留，细菌仍为紫色。相反，革兰氏阴性菌的肽聚糖�?很薄，相互间的交联度低，有较大的孔隙，而乙醇处理还可以使G－细菌细胞壁中的脂质 被溶解，进一步加大孔隙度。因此，G－细菌经酒精处理后更容易将结晶紫- 碘的复合物从细胞中抽提出来，经复染剂番红染色后呈现红色�?},{"id":731,"type":"qa","chapter":"原核微生�?,"stem":"磷壁酸的主要生理功能是什么？","answer":"1) 通过分子上大量的负电荷浓缩细胞周围的Mg2+，提高细胞膜上需Mg2+的合成酶�?活性； 2) 贮藏磷元素； 3) 能调节细胞内自溶�?autolysin)的活力，防止细胞因自溶而死亡�?4) 噬菌体的特异性吸附受体； 5) 革兰氏阳性细菌特异表面抗原的物质基础�?6) 增强某些致病菌对宿主细胞的粘连、避免被白细胞吞噬以及抗补体的作用；"},{"id":732,"type":"qa","chapter":"原核微生�?,"stem":"脂多糖主要功能是什么？","answer":"1) LPS O-特异侧链由重复分支的糖分子组成，含有己糖和二脱氧己糖�?O- 特异侧链结构的多变，决定了G-细菌细胞表面抗原决定簇的多样性； 2) LPS 的核心多糖主要组份是酮脱氧辛糖酸（KDO），负电荷较强，与磷壁酸相似，也�?吸附Mg2+、Ca2+等阳离子以提高其在细胞表面浓度的作用，对细胞膜结构起稳定�?用�?3) LPS（类脂A)是G-细菌致病物质——内毒素的物质基础 4) LPS具有控制某些物质进出细胞的选择性屏障功能； 5) LPS是许多噬菌体在细胞表面的吸附受体�?},{"id":733,"type":"qa","chapter":"原核微生�?,"stem":"细胞膜的主要生理功能是什么？","answer":"细胞膜的主要生理功能是什么？"},{"id":734,"type":"qa","chapter":"原核微生�?,"stem":"选择性地控制细胞内、外的营养物质和代谢产物的运�?","answer":"选择性地控制细胞内、外的营养物质和代谢产物的运�?"},{"id":735,"type":"qa","chapter":"原核微生�?,"stem":"维持细胞内正常渗透压的结构屏障，","answer":"维持细胞内正常渗透压的结构屏障，"},{"id":736,"type":"qa","chapter":"原核微生�?,"stem":"传递信息，接受光、电等刺激信号�?,"answer":"传递信息，接受光、电等刺激信号�?},{"id":737,"type":"qa","chapter":"原核微生�?,"stem":"是合成细胞壁和糖被成分的重要场所�?,"answer":"是合成细胞壁和糖被成分的重要场所�?},{"id":738,"type":"qa","chapter":"原核微生�?,"stem":"膜上含有与能量代谢有关的酶系，是细胞的产能基地；","answer":"膜上含有与能量代谢有关的酶系，是细胞的产能基地；"},{"id":739,"type":"qa","chapter":"原核微生�?,"stem":"是鞭毛基体的着生部位�?,"answer":"是鞭毛基体的着生部位�?},{"id":740,"type":"qa","chapter":"原核微生�?,"stem":"内膜系统包括哪些，各有什么功能？","answer":"间体：在细胞分裂时常位于细胞的中部，因此认为它在横隔膜和壁的形成及细胞分裂中 起到一定的作用；DNA的复制时的结合位点；作为细胞呼吸时的氧化磷酸化中心，类似�?线粒体作用；参与细胞内物质和能量的传递及芽孢的形成；分泌胞外酶的地方�?类囊体：主要存在于蓝细菌中，是由细胞质膜内陷而形成的片层状结构，内含叶绿素和 藻胆色素等光合色素及光合作用酶系，是蓝细菌进行光合作用的场所�?载色体：是由光合细菌的细胞质膜内陷并折叠而形成的层状、囊状或管状结构。载色体 上含有细菌叶绿素、类胡萝卜素等光合色素，光合磷酸化所需要的酶类及电子传递体�?因而是光合细菌进行光合作用的场所，相当于植物的叶绿体�?羧酶体：是存在于自养细菌中的一种多角体结构，由一层厚�?.5nm的蛋白膜包围，内�?固定二氧化碳所需�?,5-二磷酸核酮糖羧化酶和5- 磷酸核酮糖激酶，是细菌固定二氧化碳的场所�?},{"id":741,"type":"qa","chapter":"原核微生�?,"stem":"细菌主要贮藏物包括哪些、生理功能是什么？","answer":"细菌的贮藏物�?）碳源及能源类主要有：糖�?淀粉，聚�? 羟基丁酸（PHB），硫粒、硫滴�?）氮源类：藻青素，藻青蛋白�?）磷源：异染粒�?贮藏物的特点及生理功能是：a.不同微生物其储藏性内含物不同（例如厌气性梭状芽�?杆菌只含PHB，大肠杆菌只储藏糖原，但有些光和细菌二者兼有）b.微生物合理利用营�?物质的一种调节方式当环境中缺乏能源而碳源丰富时，细胞内就储藏较多的碳源类内�?物，甚至达到细胞干重�?0%，如果把这样的细胞移入有氮的培养基时，这些储藏物将被 作为碳源和能源而用于合成反应。C.储藏物以多聚体的形式存在，有利于维持细胞内环 境的平衡，避免不适合的pH，渗透压等的危害。（例如羟基丁酸分子呈酸性，而当其聚 合成�?β- 羟丁酸（PHB）就成为中性脂肪酸了，这样便能维持细胞内中性环境，避免菌体内酸性增 高。）"},{"id":742,"type":"qa","chapter":"原核微生�?,"stem":"细菌糖被的功能�?,"answer":"能提高细菌对干燥的抵抗力；作为细胞外的贮藏碳源和能源以备急需；可增强某些病原 菌的毒力；作为透性屏障和离子交换系统，以保护细菌免受重金属离子的毒害；增强细 菌的附着能力�?},{"id":743,"type":"qa","chapter":"原核微生�?,"stem":"芽孢的结构、形成过程及其耐热机制�?,"answer":"1）芽胞有许多结构层次，自外至内为孢外壁、芽孢衣、皮层、芽孢壁、芽孢膜、芽孢质 和芽孢核�?2）芽孢的形成过程a．轴丝形�?b．隔膜形�?c．前芽孢形成 d．皮层形�?e．芽孢衣形成 f．芽孢成�?g．芽孢的释放�?3）耐热原因�?a) 多层次厚而致密的壁；包括孢外壁、芽孢衣、皮层、芽孢壁 b) 芽孢核心含水量极低；含水量仅�?0-15%�?c) 芽孢质和皮层中富含DPA-Ca�?d) 芽孢衣中含硫氨基酸高�?e) 芽孢质含有十分耐热的酶类�?},{"id":744,"type":"qa","chapter":"原核微生�?,"stem":"支原体、衣原体和立克次氏体具有什么特征？","answer":"课件原核微生物（下）P111"},{"id":745,"type":"qa","chapter":"原核微生�?,"stem":"蓝细菌的特点�?,"answer":"蓝细菌为革兰氏染色阴性、无鞭毛、含叶绿素a（但不形成叶绿体）、能进行产氧性光�?作用的大型原核生物。a.分布极广b.形态差异极大，有球状、杆状和丝状等形态；C.�?胞中含有叶绿素a，进行产氧型光合作用；d.具有原核生物的典型细胞结构；e.营养极为 简单，不需要维生素，以硝酸盐或氨作为氮源，多数能固氮，其异形细胞（heterocyst ）是进行固氮的场所；f.分泌粘液层、荚膜或形成鞘衣，因此具有强的抗干旱能力；g. 无鞭毛，但能在固体表面滑行，进行光趋避运动；h.许多种类细胞质中有气泡，使菌�?漂浮，保持在光线最充足的地方，以利光合作用�?},{"id":746,"type":"qa","chapter":"原核微生�?,"stem":"简述古细菌与真细菌的区别�?,"answer":"参考课件原核微生物（下）P55表格"},{"id":747,"type":"qa","chapter":"真核微生�?,"stem":"试总结酵母菌的特点�?,"answer":"�?）个体一般以单细胞状态存�?�?）多数营出芽繁殖 �?）能发酵糖类产能 �?）细胞壁常含甘露聚糖 �?）常生活在含糖量较高、酸度较大的环境�?},{"id":748,"type":"qa","chapter":"真核微生�?,"stem":"什么是酵母的假菌丝�?,"answer":"成熟的母细胞在其形成芽体的部位长出芽细胞，芽细胞脱离母体，成为新的个体细胞�?如果不脱离母细胞，又长出新芽，子细胞就和母细胞连接在一起，形成藕节状或竹节�?的细胞串，称为假菌丝�?},{"id":749,"type":"qa","chapter":"真核微生�?,"stem":"试介绍霉菌的营养菌丝和气生菌丝各可分化成哪些特化构造，并简要说明它们的功能�?,"answer":"参考教材P92-94"},{"id":750,"type":"qa","chapter":"真核微生�?,"stem":"试列出真菌有性孢子的类型及其形成过程�?,"answer":"参考课�?第二章真核微生物73-82"},{"id":751,"type":"qa","chapter":"真核微生�?,"stem":"介绍毛霉、根霉、曲霉、青霉的主要特征及有性孢子和无性孢子的类型�?,"answer":"1) 毛霉以孢囊孢子的形式进行无性繁殖，孢子梗直接由菌丝体生出，顶端有一个球形的�?子囊，囊内有囊轴，囊轴与孢子囊梗直接相连，孢子囊成熟后，囊壁易消失或破裂。毛 霉有性繁殖是异宗配合，产生接合孢子�?2) 根霉和毛霉很相似，不同的是根霉有假根和匍匐菌丝。匍匐菌丝呈弧形，在培养基表�?水平生长。分枝状的假根伸入培养基内，与假根相对处向上生出孢子梗，顶端形成孢子 囊，内生孢囊孢子。孢子囊内具囊轴，囊轴茎部与孢子囊梗相连处有囊托。根霉在有�?繁殖中，由菌丝体或匍匐菌丝形成配子，以同宗配合形成接合孢子�?3) 曲霉菌丝体发达，菌丝分隔，菌丝体产生大量的分生孢子梗，分生孢子梗顶端膨大成为 顶囊，顶囊一般是球形的，顶囊表面长满一至二层辐射状的小梗称分生孢子小梗，小�?顶端着生成串的球形分生孢子，分生孢子梗生在足细胞上，并通过足细胞与营养菌丝�?连，足细胞是一个特化了的细胞，壁很厚。曲霉属中大多数种只进行无性繁殖，也有�?少数中能产生子囊孢子�?4) 青霉在自然界中分布很广，是水果腐烂、粮食等工农业产品霉变的主要菌。青霉的菌落 是绿色的，菌丝有横隔，气生菌丝发达，分生孢子梗顶端不膨大，有扫帚状的分枝，称 帚状枝。帚状枝是由单轮、双轮或多论分支构成。最后一级称小梗，着生小梗的细胞�?梗基，小梗上产生分生孢子。青霉中绝大多数未发现有性过程�?},{"id":752,"type":"qa","chapter":"真核微生�?,"stem":"什么是锁状联合?试图示其形成过程�?,"answer":"参考课�?第二章真核微生物81"},{"id":753,"type":"qa","chapter":"病毒","stem":"病毒的特�?","answer":"参考课�?第三�?病毒 P7"},{"id":754,"type":"qa","chapter":"病毒","stem":"试以E. coli T偶数噬菌体为例，图示并简述复合对称型病毒的典型构造�?,"answer":"参考教材P127复合对称部分�?},{"id":755,"type":"qa","chapter":"病毒","stem":"病毒的核酸有哪些类型?试举例并列表比较之�?,"answer":"参考教材P129�?-1病毒核酸的类型�?},{"id":756,"type":"qa","chapter":"病毒","stem":"什么是烈性噬菌体?试简述其裂解性生活史�?,"answer":"能在宿主细菌细胞内增殖，产生大量子代噬菌体并引起宿主菌裂解的噬菌体被称为烈�?噬菌体。噬菌体的繁殖一般分�?个阶段，即①吸附②侵入③增殖（复制与生物合成�?④成熟（装配）⑤裂解（释放）"},{"id":757,"type":"qa","chapter":"病毒","stem":"什么是效价?测定噬菌体效价有哪些方法?简述双层平板法的原理与主要操作�?,"answer":"1）每毫升试样中所含有的具侵染性的噬菌体粒子数称为效价�?2）测定噬菌体效价方法有单层平板法和双层平板法,其中双层平板法是最常用的�?3）操作步骤：先向平皿中倒入底层平板�?％琼脂培养基10mL），待凝固后倒入上层�?养基�?％琼脂培养基5mL）、宿主菌悬液（对数期菌液0.2mL）和噬菌体试样（合适稀�?�?.1mL）的混合溶液，凝固后放入37培养10h，计数噬菌斑并计算效价�?4）原理： a) 在上层培养基中宿主细胞与相应噬菌体混合后，在菌苔上形成一个具有一定形状、大�?、边缘和透明度噬菌斑。噬菌斑数量代表了病毒粒子数�?b) 加了底层培养基后，可使原来底面不平的玻璃皿的缺陷得到了弥补； c) 所形成全部噬菌体斑都接近处于同一平面上，因此不仅每一噬菌斑的大小接近、边缘清 晰，而且不致发生上下噬菌斑的重叠现象�?d) 因上层培养基中琼脂较稀，故形成的噬菌斑较大，更有利于计数�?},{"id":758,"type":"qa","chapter":"病毒","stem":"何谓一步生长曲�?,"answer":"定量描述烈性噬菌体生长规律的实验曲线，称作一步生长曲线或一级生长曲线�?该曲线可以反映每种噬菌体的三个最重要的特性参数： 潜伏期、裂解期、裂解量�?},{"id":759,"type":"qa","chapter":"病毒","stem":"什么是溶源�?它有何特�?如何检出溶源菌?","answer":"凡吸附并侵入细胞后，噬菌体的DNA只整合在宿主的核染色体组上，并可长期随宿主DNA 的复制而进行同步复制，因而在一般情况下不进行增殖和引起宿主细胞裂解的噬菌体�?称或溶源噬菌体�?特点�?①自发裂解频率很低�?②诱导裂解在UV，X射线，DNA合成的抑制剂（丝裂霉素C）等作用下可引起宿主的染色体 的破坏，宿主产生应急反应合成具有DNA重组活性的RecA蛋白，导致CI阻遏蛋白（阻止D NA切割）的被降解，噬菌体进入裂解循环�?③复愈指的是溶源菌在繁殖过程中其染色体上的原噬菌体丢失转变成非溶源性细菌的过程 �?④免疫性溶源菌对同源噬菌体有抵抗作用，即免疫性。其它同源噬菌体可以再次感染该细 胞，但不增殖，也不导致溶源性细菌裂解。免疫性是由原噬菌体产生的阻遏蛋白的可�?散性质所决定的�?⑤溶源转变原噬菌体引起的溶源性细菌除免疫性外的其他的表型改变，包括溶源菌细胞�?面性质的改变和致病性转变被称为溶源转变。白喉杆菌只有在含有特定类型的原噬菌�?时才能产生白喉毒素，引起被感染机体发病�?双层平板法形成中央是溶源菌菌落，四周为透明裂解圈的特殊菌落�?},{"id":760,"type":"qa","chapter":"病毒","stem":"动物病毒的侵入方式包括哪些类型�?,"answer":"①内吞作用：结构复杂的病毒可被宿主通过胞吞作用整个吞入，并被包围在由宿主细胞膜 形成的泡囊内，然后由宿主溶酶体释放的酶分解病毒的外层，释放出病毒核酸，如痘病 毒。为动物病毒最常用的侵入方式�?②膜融合侵入：大多数具包膜的病毒通过包膜与宿主细胞膜的融合，脱去包膜，致使核�?壳全部进入宿主细胞质，如流感病毒�?③移位侵入：有些病毒可穿过宿主细胞膜而进入细胞质，如呼肠孤病毒�?④衣壳重排侵入：寄主细胞膜有时可使无包膜病毒的壳体蛋白发生结构重排，破坏其壳�?结构，释放出的病毒核酸，并由细胞膜直接进入细胞质，如脊髓灰质炎病�?},{"id":761,"type":"qa","chapter":"病毒","stem":"病毒转录RNA的方式有哪些�?,"answer":"参考教材P131病毒mRNA的转�?},{"id":762,"type":"qa","chapter":"病毒","stem":"比较类病毒、朊病毒、卫星病毒、卫星核酸的特点�?类病毒是一类只含RNA一种成分、专性寄生在活细胞内的分子病原体�?,"answer":"朊病毒是一类不含核酸的传染性蛋白质分子，因能引起宿主体内现成同类蛋白质分子�?生与其相似构象变化，从而可使宿主致病�?卫星病毒和卫星核酸是存在于真病毒颗粒中的小的核酸分子或小的病毒颗粒，它们的共 同特定是核酸的复制必须依赖大的病毒颗粒（辅助病毒），不同的是卫星病毒的核酸能 够编码自身的外壳蛋白而卫星核酸不能�?},{"id":763,"type":"qa","chapter":"病毒","stem":"简述流感病毒、乙肝病毒、爱滋病毒的病毒结构�?,"answer":"1）流感病毒包括：核衣�?病毒分片段的负链RNA�?7 ~ 8个片段），结合有核蛋白（NP）以及与复制和转录有关的三种依赖RNA的RNA多聚酶蛋�?。呈螺旋对称。基质蛋白（M蛋白）覆盖在核衣壳外面，M蛋白抗原性稳定，也具有型�?异性。M1(增加包膜厚度)，M2 (辅助HA2释放核衣�?。外�?来自宿主细胞的脂质双层膜。刺突血凝素HA和神经氨酸酶NA�?2）Dane颗粒：包膜和核衣壳（核心结构蛋白为C蛋白、病毒DNA和DNA多聚酶）�?3）HIV病毒体呈球形，有包膜，由12个五边形�?0个六边形组成，在六边形各角上共伸 �?0-80个球状突起。核心为单链RNA带有反转录酶、核心蛋白及和衣壳蛋白�?},{"id":764,"type":"qa","chapter":"微生物的营养","stem":"简述碳源对微生物的作用，并列出微生物的碳源谱以及微生物利用碳源的一般规律�?,"answer":"碳源对微生物的作用包括：构成细胞物质；构成各种代谢产物和细胞贮藏物质；为�?生物进行生命活动提供能量�?微生物的碳源�?参考课件第四章微生物的营养P11，一般来说葡萄糖可作为大多数微生物的碳源，且�?用糖类的顺序为：单糖＞双糖和多糖；己糖＞ 戊糖；葡萄糖、果糖＞ 甘露糖、半乳糖；淀粉＞ 纤维素或几丁质等纯多糖；纯多糖＞ 琼脂等杂多糖�?},{"id":765,"type":"qa","chapter":"微生物的营养","stem":"试以能源为主、碳源为辅对微生物的营养方式进行分类，并举例说明�?,"answer":"参考课件第四章微生物的营养P47"},{"id":766,"type":"qa","chapter":"微生物的营养","stem":"微生物细胞中水的重要作用？什么叫水活�?它对微生物生命活动有何影�?","answer":"水活度aw是指在相同的温度和压力下，溶液中水的蒸汽压和纯水的蒸汽压之比。水占微 生物细胞鲜重�?0-90%，在生物体内发挥重要作用�?�?）水是细胞的重要组成成分�?�?）水直接参与代谢反应，许多反应都涉及脱水和水合�?�?）水是活细胞中各种生化反应的介质�?�?）营养物质、代谢产物都必须溶于水中才能被运输�?�?）水比热高、气化热高、沸点高，又是热的良导体，可 调节细胞的温度�?�?）维持细胞膨压�?一般来说微生物的生长需要的aw值为0.63-0.99�?},{"id":767,"type":"qa","chapter":"微生物的营养","stem":"试述基团转移运送营养物质的机制�?,"answer":"基团移位指一类既需特异性载体蛋白的参与，又需耗能的一种物质运送方式，特点是溶 质在运送前后还会发生分子结构的变化。此类运送方式主要存在于厌氧型和兼性厌氧型 细菌中。运输机制见课本P173-174"},{"id":768,"type":"qa","chapter":"微生物的营养","stem":"何谓碳氮�?不同的微生物为何有不同的碳氮比要�?","answer":"是指在微生物培养基中所含的碳源中碳原子的摩尔数与氮源中氮原子的摩尔数之比�?由于不同类型的微生物细胞组成中碳氮含量不同，代谢产物的差异等，所要求的碳氮比 不同。霉菌需C／N比较高一般为10/1；细菌和酵母需C／N比较低一般为5/1培养基�?},{"id":769,"type":"qa","chapter":"微生物的营养","stem":"半固体培养基在微生物学中有哪些应�? 细菌的动力观察（在半固体直立柱中央进行细菌的穿刺接种，观察细菌的运动能力）；","answer":"微生物趋化性的研；厌氧菌的培养、分离和计数；细菌和酵母菌的菌种保藏；以及噬�?体效价测定（双层平板法）�?},{"id":770,"type":"qa","chapter":"微生物的营养","stem":"配制培养基的原则和方法是什么？ 1）目的明�?培养不同的微生物必须采用不同的培养条件；培养目的不同，原料的选择和配比不同；","answer":"2�?营养协调 选择适宜的营养物质并注意浓度及配比问题�?3�?理化适宜 指培养基的pH值、渗透压、水活度和氧化还原电势等物理化学条件较为适宜�?4�?经济节约 配制培养基时应尽量利用廉价且易于获得的原料作为培养基成份,特别是在发酵工业�? 以降低生产成本�?},{"id":771,"type":"qa","chapter":"微生物的营养","stem":"四种物质运输方式的比�?,"answer":"参考课件第四章 微生物的营养P87�?},{"id":772,"type":"qa","chapter":"微生物的代谢","stem":"试列表比较呼吸、无氧呼吸和发酵的特点�?,"answer":"试列表比较呼吸、无氧呼吸和发酵的特点�?},{"id":773,"type":"qa","chapter":"微生物的代谢","stem":"扼要说明酵母的一型、二型和三型发酵，它们的最终产物是什么？","answer":"a.酵母菌只有在pH3.5�?.5（弱酸性）和厌氧条件下才能进行正常的酒精发酵，称之 为酵母菌的第一型发酵，亦称同型酒精发酵。G �?丙酮�?�?乙醛 �?乙醇。b.若有亚硫酸酸氢钠NaHSO3�?％）存在，与乙醛结合，而使磷酸二羟丙酮�?为受氢体。磷酸二羟丙�?�?α-磷酸甘油 �?甘油。此称为酵母菌第二型发酵，但仍有乙醇产生。c.如果将发酵过程的pH值控制在 微碱性（pH7.6左右）和厌氧条件下，乙醛分子间歧化反应一分子乙醛 �?乙酸（氧化）一分子乙醛 �?乙醇（还原）还有磷酸二羟丙酮 �?甘油。得到的产物主要是甘油、少量的乙醇、乙酸和CO2。此为酵母菌的第三型发酵 �?},{"id":774,"type":"qa","chapter":"微生物的代谢","stem":"请指出以下作为电子最终受体的呼吸类型�?,"answer":"NO3，NO2→→N2 硝酸盐呼�?Fe3+→→Fe2＋铁呼吸 S→→ H2S 硫呼�?O2→→H2O 有氧呼吸 CO2→→CH4 产甲烷菌产生甲烷的碳酸盐呼吸 Fumarate→→Succinde延胡索酸呼吸"},{"id":775,"type":"qa","chapter":"微生物的代谢","stem":"简述反硝化作用的生态学作用�?,"answer":"反硝化作用指的是硝酸盐呼吸，一般是由于好氧性机体的呼吸作用使土壤及水环境氧 气被消耗而造成局部的厌氧环境，从而使一些硝酸还盐原细菌能进行厌氧呼吸（硝酸 盐呼吸）。硝酸盐呼吸使土壤中植物能利用的氮（硝酸盐NO3- ）还原成氮气而消失，从而降低了土壤的肥力。解决放大就是松土，排除过多的水�?，保证土壤中有良好的通气条件。另一方面，反硝化作用在氮素循环中的起重要作用 ，硝酸盐是一种容易溶解于水的物质，通常通过水从土壤流入水域中。如果没有反�?化作用，硝酸盐将在水中积累，会导致水质变坏与地球上氮素循环的中断�?},{"id":776,"type":"qa","chapter":"微生物的代谢","stem":"简述氧化亚铁硫杆菌(Thiobacillus ferrooxidans)为什么能在酸性环境下生活�?,"answer":"从亚铁到高铁状态的铁的氧化，对于少数细菌来说也是一种产能反应，但从这种氧化 中只有少量的能量可以被利用。因此该菌的生长会导致形成大量的Fe3+ （Fe(OH)3）。亚铁（Fe2+）只有在酸性条件（pH低于3.0）下才能保持可溶解性和�?学稳定；当pH大于4- 5，亚铁（Fe2+）很容易被氧气氧化成为高价铁（Fe3+）。因此，能利用亚铁进行氧 化产能的细菌通常也可以氧化硫化物产能，因此保证细菌生活的低pH环境（产生大�?的硫酸）"},{"id":777,"type":"qa","chapter":"微生物的代谢","stem":"何谓初级代谢和次级代谢？扼要阐述初级代谢与次级代谢的关系�?,"answer":"微生物从外界吸收各种营养物质，通过分解代谢和合成代谢，生成维持生命活动所�?需的物质和能量的过程，称为初级代谢。相对于初级代谢而提出的一个概念。指微生 物在一定的生长时期，以初级代谢产物为前体，合成一些对微生物的生命活动无明�?功能的物质的过程�?初级代谢与次级代谢的关系�?、存在范围及产物类型不同，初级代谢：普遍存在�?各类生物中的一种基本代谢类型，次级代谢：只存在于某些生物（如植物和某些微生 物）中；2、对产生者自身的重要性不同，初级代谢产物：机体生存必不可少的物质 ，次级代谢产物：不是机体生存所必需的物�?、同微生物生长过程的关系明显不同 ，初级代谢：自始至终存在于一切生活的机体中，同机体的生长过程呈平行关系；�?级代谢：在机体生长的一定时期内，（通常是微生物的对数生长期末期或稳定期）产 生的，它与机体的生长不呈平行关系�?、对环境条件变化的敏感性或遗传稳定性上 明显不同，初级代谢产物：敏感性小（即遗传稳定性大）；次级代谢产物：敏感，�?产物的合成往往因环境条件变化而停止�?、相关酶的专一性不同，初级代谢：酶�?一性强；次级代谢：酶专一性不强，加入不同的前体物，往往可以导致机体合成不同 类型的次级代谢产物�?、某些机体内存在的二种既有联系又有区别的代谢类型"},{"id":778,"type":"qa","chapter":"微生物的生长","stem":"平板菌落计数法有何优缺点?试对浇注平板法和涂布平板法作一比较�?,"answer":"平板菌落计数法有何优缺点?试对浇注平板法和涂布平板法作一比较�?},{"id":779,"type":"qa","chapter":"微生物的生长","stem":"试绘图说明单细胞微生物的生长曲线，并指明各期的特点，及如何利用微生物的生长规","answer":"律来指导工业生产�?定量描述液体培养基中，微生物群体生长规律的实验曲线，称为生长曲线。分为延�?期、指数期、稳定期和衰亡期。根据它们每小时分裂次数的不同�?延滞期的特点：第一生长速率常数�?，第二细胞形态变大或增长，第三细胞内的RN A 尤其是rRNA 含量增高，原生质呈嗜碱性，第四合成代谢旺盛，第五对外界不良条件如NaC1 溶液浓度、温度和抗生素等理、化因素反应敏感。工业生产要缩短延滞期：第一用对 数期的菌种接种，第二接种量适量增大，第三发酵培养基成分和种子培养基的成分尽 量接近�?指数期有何特点：第一生长速率常数最大，第二细胞进行平衡成长，第三酶系活跃， 代谢旺盛。是用作代谢、生理等研究的良好材料，是增殖噬菌体的最适宿主，也是�?酵工业中用作种子的最佳材料�?稳定期特点是生长速率常数等于0，这时菌体产量达到最高点，而且菌体产量与营�?物的消耗间呈现出有规律的比例关系�?},{"id":780,"type":"qa","chapter":"微生物的生长","stem":"为什么磺胺药对细菌有抑制作用而对人无此作用？","answer":"磺胺是叶酸组成部分对氨基苯甲酸的结构类似物，以至可以和特定的酶结合，从而阻 碍了酶的功能，干扰了代谢的正常进行。磺胺的抑菌作用是因为很多细菌需要自己合 成叶酸而生长。磺胺对人体细胞无毒性，因为人缺乏从对氨基苯甲酸合成叶酸的相�?�?--- 二氢叶酸合成酶，不能用外界提供的对氨基苯甲酸自行合成叶酸，而必须直接利用叶 酸为生长因子进行生长�?},{"id":781,"type":"qa","chapter":"微生物的遗传和变�?,"stem":"为什么微生物是遗传学研究的“明星”？","answer":"为什么微生物是遗传学研究的“明星”？"},{"id":782,"type":"qa","chapter":"微生物的遗传和变�?,"stem":"引起菌种退化的根本原因是什么？如何防止菌种退化？","answer":"引起菌种退化的根本原因是什么？如何防止菌种退化？"},{"id":783,"type":"qa","chapter":"微生物的遗传和变�?,"stem":"两株基因型分别为A+B-和A-","answer":"B+的大肠杆�?E.coli)混合培养后出现了野生型菌株，你如何证明原养型的出现是�?合作用，转化作用或转导作用的结果�?实验一：将两菌株分别放入中间有烧结玻璃的U形玻璃管中，两边反复加压使液体交 换，分别培养。实验二：将两菌株先分别加入一定量的DNA酶消解胞外的游离DNA分子 ，再混合培养�?若实验一、二均有原养型出现，说明是转导作用，因为带有供体DNA的噬菌体可通过 烧结玻璃，并且噬菌体中的DNA不受DNA酶的作用�?若实验一无原养型出现，而实验二有原养型出现，说明是接合作用，因为接合作用需 菌体接触，但胞外的DNA酶不能作用于接合转移的DNA�?若实验一、二均无原养型出现，说明是转化作用，因为游离DNA不能通过烧结玻璃�?而且要被DNA酶分解�?},{"id":784,"type":"qa","chapter":"绪论","stem":"“微生物对人类的重要性，你怎么强调都不过分。”试用具体事例来说明这句话的深刻�?,"answer":"义�?从四个方面具体的事例来说明人类与微生物的关系�?(1)物质和能量循�?(2)人体生理屏障 (3)提供必需物质 (4)现代生物技术等方面�?},{"id":785,"type":"qa","chapter":"绪论","stem":"简述科赫原则�?如何判定某种微生物是病原菌？)","answer":"(1)某一种微生物，当被怀疑是病原体时，它一定伴随着病害而存在�?(2)必须能自原寄主分离出这种微生物，并培养成为纯培养�?(3)用已纯化的纯培养微生物，人工接种寄主，必须能诱发与原来病害相同病害�?(4)必须自人工接种发病的寄主内，能重新分离出同一病原微生物并培养成纯培养�?},{"id":786,"type":"qa","chapter":"绪论","stem":"微生物有哪五大共性？其中最基本的是哪一个？为什么？","answer":"�?体积小，面积大；�?吸收多，转化快；�?生长旺，繁殖快；�?适应强，易变异；�?.分布广，种类多。其中，体积小面积大最基本，因为一个小体积大面积系统，必然 有一个巨大的营养物质吸收面、代谢废物的排泄面和环境信息的交换面，并由此而产 生其�?个共性�?},{"id":787,"type":"qa","chapter":"绪论","stem":"什么是微生物，微生物学？学习微生物学的任务是什么？","answer":"微生物是一切肉眼看不见或看不清的微小生物的总称。包括：①原核类的细菌、放�?菌、蓝细菌、支原体、立克次氏体和衣原体；②真核类的真菌、原生动物、和显微�?类，以及属于非细胞类的病毒和亚病毒。微生物学是一门在细胞、分子或群体水平�?研究微生物的形态构造、生理代谢、遗传变异、生态分布和分类进化等生命活动基�?规律，并将其应用于工业发酵、医药卫生、生物工程和环境保护等实践领域的科学�?其根本任务是发掘、利用、改善和保护有益微生物，控制、消灭或改造有害微生物�?为人类社会的进步服务�?},{"id":788,"type":"qa","chapter":"绪论","stem":"简述微生物对生命科学基础理论研究有何重大贡献�?,"answer":"答案要点�?）微生物是生命科学研究的理想材料�?）利用酵母菌细胞制剂进行酒精 发酵研究，不但阐明了生物体内糖的复杂转化过程，且为近代生物化学领域的酶学�?定了基础�?）比德尔（Beadle）用脉胞菌进行突变试验，阐明了基因和酶的关系�?提出了“一个基因一个酶”的假说，开创了生化遗传学新学科�?）遗传的物质基础�?用微生物证实的；5）遗传密码的被揭露、中心法则的确定、基因对酶的调节控制�?分子生物学的基本原理都与微生物学有密切关系；6）遗传工程的主角：①作为遗传�?程中表达DNA所携带的遗传性状的载体，今天依然以大肠杆菌、枯草芽胞杆菌和酵母 菌等微生物为主，基因工程药物的生产几乎都是微生物；②在基因工程的操作中用�?切割DNA取得所需基因的“手术刀”的限制性内切酶都来自微生物；③基因的载体是病毒 、噬菌体、质粒；④动植物细胞培养和发酵技术；7）微生物技术向微生物科学的整个 领域扩散�?},{"id":789,"type":"qa","chapter":"细菌和古生菌","stem":"试图示G+细菌和G¯细菌细胞壁的主要构造，并简要说明其异同�?,"answer":"见课件中的图示，主要目的是让大家牢记G+细菌和G¯细菌细胞壁的结构差异�?},{"id":790,"type":"qa","chapter":"细菌和古生菌","stem":"试述革兰氏染色的方法、原理和实验注意事项�?,"answer":"简述革兰氏染色机理。革兰氏染色的机制为：通过结晶紫初染和碘液媒染后，在细�?的细胞膜内可形成不溶于水的结晶紫与碘的复合物。G+由于其细胞壁较厚、肽聚糖�?层次多和交联致密，故遇脱色剂乙醇处理时，因失水而使网孔缩小，在加上它不含类 脂，故乙醇的处理不会溶出缝隙，因此能把结晶紫与碘的复合物牢牢留在壁内，使�?保持紫色。反之，G¯细菌因其细胞壁薄、外膜层类脂含量高、肽聚糖层薄和交联度�?，遇脱色剂乙醇后，以类脂为主的外膜迅速溶解，这时薄而松散的肽聚糖网不能阻挡 结晶紫与碘复合物的溶出，因此细胞退成无色。这时，在经沙黄等红色染料复染，�?使G¯细菌呈红色，而G+细菌则仍保留最初的紫色。此法证明了G+和G¯主要由于起细�?壁化学成分的差异而引起了物理特性的不同而使染色反应不同，是一种积极重要的�?别染色法，不仅可以用与鉴别真细菌，也可鉴别古生菌�?},{"id":791,"type":"qa","chapter":"细菌和古生菌","stem":"证实细菌细胞壁存在的方法有哪些？细胞壁的主要生理功能是什么？","answer":"1）证实细胞壁存在的方法：a.细菌超薄切片的电镜直接观察；b.质、壁分离与适当 的染色，可以在光学显微镜下看到细胞壁；c.机械法破裂细胞后，分离得到纯的细�?壁；d.制备原生质体，观察细胞形态的变化�?）细胞壁的功能：a.固定细胞外形�?提高机械强度；b.为细胞的生长、分裂和鞭毛运动所必需；c.渗透屏障，阻拦酶蛋�?和某些抗生素等大分子物质（分子量大于800）进入细胞，保护细胞免受溶菌酶、消 化酶和青霉素等有害物质的损伤；d.细菌特定的抗原性、致病性以及对抗生素和噬菌 体的敏感性的物质基础�?},{"id":792,"type":"qa","chapter":"细菌和古生菌","stem":"有哪些方法可以证实某一细菌存在着鞭毛�?,"answer":"鞭毛的长度一般为15�?0μm，直径为0.01�?.02μm。a.观察鞭毛最直接的方法用电子 显微镜。用特殊的鞭毛染色法使染料沉积在鞭毛上，加粗后的鞭毛也可用光学显微镜 观察。b.在暗视野中，对水浸片或悬滴标本中运动着的细菌，也可根据其运动方式判 断它们是否具有鞭毛。c.在半固体（含0.3%�?.4%琼脂）直立柱中用穿刺法接种某一 细菌，经培养后，若在穿刺线周围有呈混浊的扩散区，说明该菌具有运动能力，并�?推测其长有鞭毛，反之，则无鞭毛；d.根据某菌在平板培养基上的菌落外形也可推断 它有无鞭毛，一般地说，如果该菌长出的菌落形状大、薄且不规则，边缘极不圆整， 说明该菌运动能力很强，反之，若菌落外形圆整、边缘光滑、厚度较大，则说明它�?无鞭毛的细菌�?},{"id":793,"type":"qa","chapter":"细菌和古生菌","stem":"细菌主要贮藏物的特点及生理功能是什么？","answer":"细菌的贮藏物�?）碳源及能源类主要有：糖�?淀粉，聚�? 羟基丁酸（PHB），硫粒、硫滴�?）氮源类：藻青素，藻青蛋白�?）磷源：异染�?�?},{"id":794,"type":"qa","chapter":"细菌和古生菌","stem":"贮藏物的特点及生理功能是�?,"answer":"a.不同微生物其储藏性内含物不同（例如厌气性梭状芽胞杆菌只含PHB，大肠杆菌只 储藏糖原，但有些光和细菌二者兼有）b.微生物合理利用营养物质的一种调节方式当 环境中缺乏能源而碳源丰富时，细胞内就储藏较多的碳源类内含物，甚至达到细胞干 重的50%，如果把这样的细胞移入有氮的培养基时，这些储藏物将被作为碳源和能�?而用于合成反应。c.储藏物以多聚体的形式存在，有利于维持细胞内环境的平衡，避 免不适合的pH，渗透压等的危害。（例如羟基丁酸分子呈酸性，而当其聚合成�?β- 羟丁酸（PHB）就成为中性脂肪酸了，这样便能维持细胞内中性环境，避免菌体内酸 性增高。）"},{"id":795,"type":"qa","chapter":"细菌和古生菌","stem":"什么是缺壁细菌？试列表比较4类缺壁细菌的形成、特点和实际应用�?,"answer":"在自然界长期进化中和实验室菌种的自发突变中都会产生少数缺细胞壁的 3","answer":"mm，能通过细菌滤器；c.专性活细胞内寄生，衣原体有一定的代谢活性，能进行有�?的大分子合成，但缺乏产生能量的系统，必须依赖宿主获得ATP，因此又被称为“能�?寄生型生物”；d.在宿主细胞内生长繁殖具有独特的生活周期，即存在原体和始体�?种形态；e.衣原体广泛寄生于人类、哺乳动物及鸟类，少数致病；f.衣原体不耐热�?60�?0分钟即被灭活，但它不怕低温，冷冻干燥可保藏多年。对红霉素、氯霉素、四 环素敏感�?},{"id":800,"type":"qa","chapter":"细菌和古生菌","stem":"蓝细菌及其特点？蓝细菌也称蓝藻或蓝绿藻（blue-green","answer":"algae），是一类进化历史悠久、革兰氏染色阴性、无鞭毛、含叶绿素a（但不形成叶 绿体）、能进行产氧性光合作用的大型原核生物。a.分布极广b.形态差异极大，有球 状、杆状和丝状等形态；c.细胞中含有叶绿素a，进行产氧型光合作用；d.具有原核 生物的典型细胞结构；e.营养极为简单，不需要维生素，以硝酸盐或氨作为氮源，�?数能固氮，其异形细胞（heterocyst）是进行固氮的场所；f.分泌粘液层、荚膜或�?成鞘衣，因此具有强的抗干旱能力；g.无鞭毛，但能在固体表面滑行，进行光趋避运 动；h.许多种类细胞质中有气泡，使菌体漂浮，保持在光线最充足的地方，以利光合 作用�?},{"id":801,"type":"qa","chapter":"真核微生�?,"stem":"对真核生物和原核生物的主要差别作一比较�?,"answer":"|比较项目 |真核生物 |原核生物 | |细胞大小 |较大（通常直径�?|较小（通常直径�?| | |mm �?|mm�?| |若有壁，其主要成�?|纤维素、几丁质�?|多数为肽聚糖 | |细胞膜中甾醇 |�?|无（仅支原体例外 | | | |�?| |细胞膜含呼吸或光�?|�?|�?| |成分 | | | |细胞�?|�?|�?| |鞭毛结构 |如有，则粗而复�?|如有，则细而简�?| |细胞核|核膜 |�?|�?| | |DNA含量 |低（�?％） |高（�?0％） | | |组蛋�?|�?|�?| | |核仁 |�?|�?| | |染色体数 |一般＞1 |一般为1 | | |有丝分裂 |�?|�?| | |减数分裂 |�?|�?| |生理特|氧化磷酸化部|线粒�?|细胞�?| |�?|�?| | | | |光合作用部位|叶绿�?|细胞�?| | |生物固氮能力|�?|有些�?| | |专性厌氧生活|罕见 |常见 | | |化能合成作用|�?|有些�?| |鞭毛运动方式 |挥鞭�?|旋转马达�?| |遗传重组方式 |有性生殖、准性生 |转化、转导、接�?| | |殖等 |�?| |繁殖方式 |有性、无性等多种 |一般为无性（二等 | | | |分裂�?|"},{"id":802,"type":"qa","chapter":"真核微生�?,"stem":"试图示酿酒酵母的生活史，并对其中各主要过程作一简述�?,"answer":"[pic] 营养体既能以单倍体也能以二倍体形式存在 典型代表：酿酒酵�?特点：（1）一般情况下都以营养体状态进行出芽繁�?�?）营养体既能以单倍体（n）形式存在，也能以二倍体�?n）形式存�?�?）在特定的条件下进行有性繁�?},{"id":803,"type":"qa","chapter":"真核微生�?,"stem":"试以表解法介绍霉菌的营养菌丝和气生菌丝各可分化成哪些特化构造，并简要说明它�?,"answer":"的功能�?[pic]"},{"id":804,"type":"qa","chapter":"真核微生�?,"stem":"试比较细菌、放线菌、酵母菌和霉菌细胞壁成分的异同，并提出制备各自原生质体应�?,"answer":"用的相应酶或试剂�?细菌细胞壁主要成分为肽聚糖，具有固定细胞外形和保护细胞不受损伤。细菌原生质 体的制备：溶菌酶（lysozyme）、青霉素�?酵母菌细胞壁主要成分甘露聚糖（mannan）（外层）；蛋白质（protein）（中层�?；葡聚糖（glucan）（内层），类脂，几丁质�?酵母原生质体的制备：蜗牛消化酶�?放线菌和霉菌的细胞壁主要成分微纤维（microfibril）纤维素、几丁质；无定形�?质成分：葡聚糖、蛋白质、脱乙酰几丁质、甘露聚糖、少量脂类无机盐等。原生质�?的制备可用蜗牛消化酶水解�?},{"id":805,"type":"qa","chapter":"真核微生�?,"stem":"什么是菌落？试比较细菌、放线菌、酵母菌和霉菌的菌落特征�?,"answer":"菌落即单个（或聚集在一起的一团）微生物在适宜的固体培养基表面或内部生长、繁 殖到一定程度可以形成肉眼可见的、有一定形态结构的子细胞生长群体�?酵母菌菌落一般较细菌菌落大且厚，表面湿润，粘稠，易被挑起，多为乳白色，少�?呈红色�?霉菌菌落由粗而长的分枝状菌丝组成，菌落疏松，呈绒毛状、絮状或蜘蛛网状，比�?菌菌落大几倍到几十倍，有的没有固定大小�?放线菌菌落能产生大量分枝和气生菌丝的菌种（如链霉菌）菌落质地致密，与培养�?结合紧密，小而不蔓延，不易挑起或挑起后不易破碎。不能产生大量菌丝体的菌种（ 如诺卡氏菌）粘着力差，粉质，针挑起易粉碎�?细菌的菌落一般呈现湿润，较光滑，较透明，较粘稠，易挑取，质地均匀以及菌落�?反面或边缘与中央部位的颜色一致�?细菌属单细胞生物，一个菌落内无数细胞并没有形态，功能上的分化，细胞间充满着 毛细管状态的水。多数放线菌有基内和气生菌丝的分化，气生菌丝成熟时又会进一�?分化成孢子丝并产生成串的干粉状孢子，它们伸展在空间，菌丝间没有毛细管水积�?。酵母菌的细胞比细菌的大，细胞内有许多分化的细胞器，细胞间隙含水量相对较�?，以及不能运动等特点。霉菌的细胞呈丝状，在固体培养基上生长时又有营养和气�?菌丝的分化，气生菌丝间没毛细管水�?},{"id":806,"type":"qa","chapter":"真核微生�?,"stem":"真菌及其特点�?,"answer":"真菌（fungi；eumycetes）是具有真核和细胞壁的异养生物。真菌是分化较为复杂�?微生物，其种类繁多，形态各异，大小悬殊，细胞结构多样，在自然界分布广泛，真 菌独立于植物和动物之外， 成为微生物的一个类群。真菌通常又分为三类，即酵母菌、霉菌和蕈菌（大型真菌） ，它们归属于不同的亚门�?真菌具有以下3个主要特点：首先，它们是真核生物，有明确的核膜包围着细胞核， �?常在一个细胞内可以包含多个核，这一特点在其他真核生物中是不常发现的；其次， 它们是异养型微生物，靠吸收方式获取营养，即细胞表面从周围环境中吸收可溶性营 养物质，这种营养方式不同于植物的光合作用，也不同于原生动物的吞噬作用；再�?，真菌中多数是丝状个体，没有叶绿素，所以很容易与藻类区分。此外，如真菌的�?子繁殖，特殊的组织结构，以及形态和生理特性等方面都有具特点�?},{"id":807,"type":"qa","chapter":"病毒","stem":"病毒粒有哪几种对称形�?每种对称又有几种特殊外形?试各举一例�?,"answer":"尤其是要记住下面的典型： ①螺旋对称型—TMV 呈直杆状，中�?②二十面体对称—腺病毒 外形呈典型的二十面体 ③复合对称—T偶数噬菌�?呈蝌蚪状"},{"id":808,"type":"qa","chapter":"病毒","stem":"什么是病毒?病毒有哪些不同于其他微生物之�? 病毒是一类超显微的，没有细胞结构的，专性活细胞内寄生的分子生物。迄今仍无一 个科学而严谨的定义�?病毒的特点：1）不具有细胞结构，具有一般化学大分子的特征�?2）一种病毒的毒粒内只含有一种核酸，DNA或者RNA�?3）大部分病毒没有酶或酶系极不完全，不含催化能量代谢的酶，不能进行独立的代 谢作用�?4）严格的活细胞内寄生�?5）个体微小，在电子显微镜下才能看见�?6）对大多数抗生素不敏感，对干扰素敏感�?7）在离体条件下，能以无生命的生物大分子状态存在，并可长期保持其侵染活力�?,"answer":"8）有些病毒的核酸还能整合到宿主的基因组中，并诱发潜伏性感染�?},{"id":809,"type":"qa","chapter":"病毒","stem":"病毒结构蛋白的主要生理功能是什�?p85-86","answer":"病毒结构蛋白的主要生理功能是什�?p85-86"},{"id":810,"type":"qa","chapter":"病毒","stem":"在结构蛋白中，核壳蛋白保护基因组和装配形成病毒粒结构，另外核壳蛋白也在装配过","answer":"程中与核酸基因组相互作用。包围病毒粒的包膜所含的蛋白是糖蛋白，糖蛋白由多�?单体聚集形成刺突。病毒粒包膜中还有基质蛋白，其作用是联系包膜和内部的核壳�?白，起着支撑包膜和维持病毒结构的作用，并在核壳与包膜糖蛋白之间的识别以及�?毒出芽过程中发挥作用�?},{"id":811,"type":"qa","chapter":"病毒","stem":"何谓一步生长曲�?试述各期的特点�?,"answer":"一步生长曲线：定量描述烈性噬菌体增殖规律的实验曲线称作一步生长曲线或一级生 长曲线。把在对数期生长的敏感细菌悬浮液与适量的噬菌体混合避免几个噬菌体同�?侵染一个细菌细胞。经数分钟吸附后，混合液中加入一定量的该噬菌体的抗血清，�?中和尚未吸附的噬菌体。然后再用培养液进行高倍稀释，以免发生第二次吸附和感染 。在一定时间内，每隔数分钟取样作效价测定。以效价为纵坐标，培养时间为横坐�?所绘成的曲线即为一步生长曲线，它可以反映每种噬菌体的三个最重要的特性参数： 潜伏期、裂解期、裂解量。在吸附后的开始一段时间内�?�?0min），噬菌斑数不见 增加，说明噬菌体尚未完成复制和组装，这段时间称为噬菌体的潜伏期。紧接着在潜 伏期后的一段时间（感染�?0�?0min），平板中的噬菌斑数突然直线上升，表示噬 菌体已从寄主细胞中裂解释放出来，这段时间称为裂解期。每个被感染的细菌释放新 的噬菌体的平均数称为裂解量。当宿主全部裂解，溶液中的噬菌体的效价达到最高点 时称为平稳期�?潜伏期：从噬菌体吸附细菌细胞至细菌细胞释放出新的噬菌体的最短时间。又可分�?隐晦期和胞内累积期�?裂解期：从被感染的第一个细胞裂解至最后一个细胞裂解完毕所经历的时间�?平稳期：指被感染的宿主已全部裂解，溶液中噬菌体数达到最高点后的时期�?裂解量：每个被感染的细菌释放新的噬菌体的平均数�?},{"id":812,"type":"qa","chapter":"微生物的营养","stem":"三种物质运输方式的比�?|运输方式 |单纯扩散 |促进扩散 |主动运输 |基团移位 | |项目 | | | | | |能量消�?| | | | | |溶质运送方�?| | | | | |平衡时内外浓�?| | | | | |载体蛋白 | | | | | |运送分子有无特异性| | | | | |运送对象举�?| | | | |","answer":"[pic]"},{"id":813,"type":"qa","chapter":"微生物的营养","stem":"以EBM（伊红美蓝乳糖琼脂培养基）为例，分析鉴别培养基的作用原理�?,"answer":"以EBM（伊红美蓝乳糖琼脂培养基）为例，分析鉴别培养基的作用原理�?},{"id":814,"type":"qa","chapter":"微生物的营养","stem":"鉴别培养基是一类在成分中加有能与目的菌的无色代谢产物发生显色反应的指示剂，�?,"answer":"而达到只须用肉眼鉴别颜色就能方便地从近似菌落中找到目的菌菌落的培养基�?},{"id":815,"type":"qa","chapter":"微生物的营养","stem":"EBM培养基中伊红为酸性染料，美蓝为碱性染料，均为苯胺类染料�?当大肠杆菌分解乳糖产酸时细菌带正电荷被染成红色，再与美蓝结合形成紫黑色菌�?，并带有绿色金属光泽�?在碱性环境中不分解乳糖产酸的细菌不着色，伊红和美蓝不能结合，故沙门氏菌等�?无色或琥珀色半透明菌落。金葡菌在此培养基上不生长。常用的伊红美蓝乳糖培养�?，可用来鉴别饮用水和乳制品中是否存在大肠杆菌等细菌。如果有大肠杆菌，因其强 烈分解乳糖而产生大量的混合酸，菌体带H+，故菌落被染成深紫色，从菌落表面的反 射光中还可以看到金属光泽�?,"answer":"----------------------- 丝状：大肠杆菌的f1、fd、M13�?有包�?杆状：烟草花叶病毒（TMV）等 螺旋对称 对称体制 无包�?卷曲状：正粘病毒（流感病毒）�?大型：腺病毒�?弹状：狂犬病毒，水泡性口膜炎病毒�?无包�?小型：脊髓灰质炎病毒，φX174噬菌体等 二十面体对称 有包膜：疱疹病毒 复合对称 无包膜：大肠杆菌的T偶数噬菌体（蝌蚪状）�?有包膜：痘病毒（砖块状）"},{"id":816,"type":"judge","chapter":"微生物的代谢","stem":"光合磷酸化和氧化磷酸化一样都是通过电子传递系统产生ATP。（ �?)","answer":"光合磷酸化和氧化磷酸化一样都是通过电子传递系统产生ATP。（ �?)"},{"id":817,"type":"judge","chapter":"微生物的代谢","stem":"光合叶绿素和高等植物中的叶绿素具有相类似的化学结构。（ �?)","answer":"光合叶绿素和高等植物中的叶绿素具有相类似的化学结构。（ �?)"},{"id":818,"type":"judge","chapter":"微生物的代谢","stem":"葡萄糖的生物氧化从本质上来看是与化学氧化(即燃�?相同的。（ �?)","answer":"葡萄糖的生物氧化从本质上来看是与化学氧化(即燃�?相同的。（ �?)"},{"id":819,"type":"judge","chapter":"微生物的代谢","stem":"呼吸�?RC)就是电子传递链(ETC)。（ �?)","answer":"呼吸�?RC)就是电子传递链(ETC)。（ �?)"},{"id":820,"type":"judge","c var SUPABASE_URL = '';
var SUPABASE_KEY = '';
var supabase = null;
var supabaseReady = false;
(function initSupabase() {
    if (SUPABASE_URL && SUPABASE_KEY) {
        try { supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY); supabaseReady = true; } catch(e) {}
    }
})();

var userNickname = '';
(function loadNickname() {
    try { userNickname = localStorage.getItem('microbio_nickname') || ''; } catch(e) {}
})();
function saveNickname(name) {
    userNickname = name;
    try { localStorage.setItem('microbio_nickname', name); } catch(e) {}
}

function formatTime(iso) {
    if (!iso) return '';
    var d = new Date(iso);
    var now = new Date();
    var diff = now - d;
    if (diff < 60000) return '�ո�';
    if (diff < 3600000) return Math.floor(diff / 60000) + '����ǰ';
    if (diff < 86400000) return Math.floor(diff / 3600000) + 'Сʱǰ';
    return d.getFullYear() + '-' + ('0'+(d.getMonth()+1)).slice(-2) + '-' + ('0'+d.getDate()).slice(-2);
}

async function loadNotes(questionId) {
    var listEl = document.getElementById('noteList-' + questionId);
    if (!listEl) return;
    var notes = [];
    if (supabaseReady) {
        try {
            var res = await supabase.from('question_notes').select('*').eq('question_id', parseInt(questionId)).order('created_at', { ascending: false }).limit(30);
            if (!res.error && res.data) notes = res.data;
        } catch(e) {}
    } else {
        try {
            var all = JSON.parse(localStorage.getItem('microbio_notes') || '{}');
            notes = all[questionId] || [];
        } catch(e) {}
    }
    if (notes.length === 0) {
        listEl.innerHTML = '<div class="note-empty">���ޱʼǣ���д��һ���� ??</div>';
    } else {
        var h = '';
        for (var i = 0; i < notes.length; i++) {
            var n = notes[i];
            h += '<div class="note-item">';
            h += '<div class="note-meta"><strong>' + esc(n.nickname || '����') + '</strong> �� ' + formatTime(n.created_at) + '</div>';
            h += '<div class="note-content">' + esc(n.content) + '</div>';
            h += '</div>';
        }
        listEl.innerHTML = h;
    }
}

async function submitNote(questionId) {
    var input = document.getElementById('noteInput-' + questionId);
    if (!input) return;
    var content = input.value.trim();
    if (!content) return;
    var nickname = userNickname || '����';
    input.value = '';
    input.disabled = true;
    if (supabaseReady) {
        try {
            var res = await supabase.from('question_notes').insert([{ question_id: parseInt(questionId), nickname: nickname, content: content }]);
            if (res.error) throw res.error;
        } catch(e) { saveNoteLocal(questionId, nickname, content); }
    } else { saveNoteLocal(questionId, nickname, content); }
    input.disabled = false;
    loadNotes('' + questionId);
}

function saveNoteLocal(questionId, nickname, content) {
    try {
        var all = JSON.parse(localStorage.getItem('microbio_notes') || '{}');
        if (!all[questionId]) all[questionId] = [];
        all[questionId].unshift({ nickname: nickname, content: content, created_at: new Date().toISOString() });
        localStorage.setItem('microbio_notes', JSON.stringify(all));
    } catch(e) {}
}

var currentPool = [];
var currentIndex = -1;
var answers = {};
var answered = false;
var wrongSet = {};

function saveProgress() {
    try {
        var state = {
            typeFilter: document.getElementById('typeFilter').value,
            orderMode: document.getElementById('orderMode').value,
            chapterFilter: document.getElementById('chapterFilter').value,
            poolIds: currentPool.map(function(q) { return q.id; }),
            currentIndex: currentIndex,
            answers: answers,
            wrongOnly: document.getElementById('btnWrongOnly').dataset.active === 'true'
        };
        // Always save to localStorage (same-session backup)
        try { localStorage.setItem('microbio_progress', JSON.stringify(state)); } catch(e) {}
        try { localStorage.setItem('microbio_wrongSet', JSON.stringify(wrongSet)); } catch(e) {}
    } catch(e) {}
}

function loadProgress() {
    try {
        var raw = localStorage.getItem('microbio_progress');
        if (!raw) return false;
        var state = JSON.parse(raw);
        if (!state.poolIds || !state.poolIds.length) return false;
        try {
            var ws = localStorage.getItem('microbio_wrongSet');
            if (ws) wrongSet = JSON.parse(ws);
        } catch(e) {}
        return state;
    } catch(e) { return false; }
}

function init(restoreProgress) {
    var state = null;
    if (restoreProgress !== false) {
        state = loadProgress();
    }

    var type, order, chapter, wrongOnly;
    if (state) {
        type = state.typeFilter || 'all';
        order = state.orderMode || 'random';
        chapter = state.chapterFilter || 'all';
        wrongOnly = state.wrongOnly || false;
        document.getElementById('typeFilter').value = type;
        document.getElementById('orderMode').value = order;
        document.getElementById('chapterFilter').value = chapter;
        if (wrongOnly) {
            document.getElementById('btnWrongOnly').dataset.active = 'true';
            document.getElementById('btnWrongOnly').textContent = '错题模式 �?;
        } else {
            document.getElementById('btnWrongOnly').dataset.active = 'false';
            document.getElementById('btnWrongOnly').textContent = '只练错题';
        }
    } else {
        type = document.getElementById('typeFilter').value;
        order = document.getElementById('orderMode').value;
        chapter = document.getElementById('chapterFilter').value;
        wrongOnly = document.getElementById('btnWrongOnly').dataset.active === 'true';
    }

        var filtered = ALL_QUESTIONS;
    if (type !== 'all') filtered = ALL_QUESTIONS.filter(function(q) { return q.type === type; });
    if (chapter !== 'all') filtered = filtered.filter(function(q) { return q.chapter === chapter; });
    if (wrongOnly) {
        var wrongIds = Object.keys(wrongSet);
        filtered = filtered.filter(function(q) { return wrongIds.indexOf(String(q.id)) >= 0; });
        if (filtered.length === 0) {
            alert('没有错题可练习！');
            document.getElementById('btnWrongOnly').dataset.active = 'false';
            document.getElementById('btnWrongOnly').textContent = '只练错题';
            init(false);
            return;
        }
    }

    // Restore pool order or create new one
    if (state && state.poolIds) {
        var idMap = {};
        filtered.forEach(function(q) { idMap[q.id] = q; });
        currentPool = [];
        state.poolIds.forEach(function(id) {
            if (idMap[id]) currentPool.push(idMap[id]);
        });
        // Add any new questions not in saved state
        filtered.forEach(function(q) {
            if (currentPool.indexOf(q) < 0) currentPool.push(q);
        });
    } else if (order === 'random') {
        currentPool = filtered.slice().sort(function() { return Math.random() - 0.5; });
    } else {
        currentPool = filtered.slice();
    }

    currentIndex = (state && state.currentIndex < currentPool.length) ? state.currentIndex : 0;
    answers = (state && state.answers) ? state.answers : {};
    var cq = currentPool[currentIndex];
    var ca = cq ? answers[cq.id] : null;
    answered = ca && !ca.skipped;
    updateUI();
    document.getElementById('results').classList.remove('show');
    document.getElementById('results').innerHTML = '';
    document.getElementById('questionArea').style.display = '';
    document.getElementById('actions').style.display = '';
    renderQuestion();
}

function updateUI() {
    var total = currentPool.length;
    var done = Object.keys(answers).length;
    var correctVals = Object.values(answers).filter(function(a) { return a.isCorrect; });
    var skippedVals = Object.values(answers).filter(function(a) { return a.skipped; });
    var correct = correctVals.length;
    var wrong = done - correct - skippedVals.length;
    var remaining = total - done;

    document.getElementById('progressText').textContent = done + ' / ' + total;
    document.getElementById('correctCount').textContent = correct;
    document.getElementById('wrongCount').textContent = wrong;
    document.getElementById('remainingCount').textContent = remaining;
    document.getElementById('progressFill').style.width = total ? (done / total * 100) + '%' : '0%';

    if (done === total && total > 0) {
        showResults();
    }

    var hasWrong = Object.keys(wrongSet).length > 0;
    document.getElementById('btnWrongOnly').style.display = hasWrong ? '' : 'none';
}


function submitFill() {
    if (answered) return;
    var q = currentPool[currentIndex];
    var blanks = [];
    var i = 0;
    while (document.getElementById('fill-' + i)) {
        blanks.push(document.getElementById('fill-' + i).value.trim());
        i++;
    }
    // Check if all blanks are filled
    var anyFilled = blanks.some(function(b) { return b.length > 0; });
    if (!anyFilled) return;

// Fill-in helper
function submitFillAnswer(qid) {
    if (answered) return;
    var q = currentPool[currentIndex];
    if (!q || q.id !== qid) return;
    var parts = q.stem.split('------');
    var userAnswers = [];
    for (var i = 0; i < parts.length - 1; i++) {
        var inp = document.getElementById('fillInput' + qid + '_' + i);
        userAnswers.push(inp ? inp.value.trim() : '');
    }
    var userAnswer = userAnswers.join('��');
    var isCorrect = userAnswer === q.answer;
    recordAnswer(q, userAnswer, isCorrect, false);
}

function revealGlossaryQA(qid) {
    if (answered) return;
    var q = currentPool[currentIndex];
    if (!q || q.id !== qid) return;
    answers[q.id] = { userAnswer: '(�Ѳ鿴��)', isCorrect: false, revealed: true };
    answered = true;
    wrongSet[String(q.id)] = true;
    try { localStorage.setItem('microbio_wrongSet', JSON.stringify(wrongSet)); } catch(e) {}
    renderQuestion();
    updateUI();
    saveProgress();
}

function selfAssess(qid, isCorrect) {
    var q = currentPool[currentIndex];
    if (!q || q.id !== qid) return;
    var a = answers[q.id];
    if (!a || !a.revealed) return;
    if (a.selfAssessed) return;
    a.isCorrect = isCorrect;
    a.userAnswer = isCorrect ? '�� ����' : '�� ������';
    a.selfAssessed = true;
    answered = true;
    if (isCorrect) {
        delete wrongSet[String(q.id)];
    } else {
        wrongSet[String(q.id)] = true;
    }
    try { localStorage.setItem('microbio_wrongSet', JSON.stringify(wrongSet)); } catch(e) {}
    // Record stats
    try {
        var stats = JSON.parse(localStorage.getItem('microbio_stats') || '{}');
        var sid = String(q.id);
        if (!stats[sid]) stats[sid] = {a: 0, c: 0};
        stats[sid].a++;
        if (isCorrect) stats[sid].c++;
        localStorage.setItem('microbio_stats', JSON.stringify(stats));
    } catch(e) {}
    // Supabase report
    reportToCloud(q.id, isCorrect);
    renderQuestion();
    updateUI();
    saveProgress();
    // Auto-advance after self-assessment
    setTimeout(function() {
        if (currentIndex < currentPool.length - 1) nextQuestion();
    }, 600);
}

function recordAnswer(q, userAnswer, isCorrect, isRevealed) {
    answers[q.id] = { userAnswer: userAnswer, isCorrect: isCorrect, revealed: !!isRevealed };
    answered = true;
    if (!isCorrect || isRevealed) {
        wrongSet[String(q.id)] = true;
    } else {
        delete wrongSet[String(q.id)];
    }
    try { localStorage.setItem('microbio_wrongSet', JSON.stringify(wrongSet)); } catch(e) {}
    try {
        var stats = JSON.parse(localStorage.getItem('microbio_stats') || '{}');
        var sid = String(q.id);
        if (!stats[sid]) stats[sid] = {a: 0, c: 0};
        stats[sid].a++;
        if (isCorrect) stats[sid].c++;
        localStorage.setItem('microbio_stats', JSON.stringify(stats));
    } catch(e) {}
    reportToCloud(q.id, isCorrect);
    renderQuestion();
    updateUI();
    saveProgress();
    // Auto-advance on correct, stay on wrong
    if (isCorrect && !isRevealed) {
        setTimeout(function() {
            if (currentIndex < currentPool.length - 1) nextQuestion();
        }, 600);
    }
}

function reportToCloud(questionId, isCorrect) {
    try { MicrobioBridge.reportAnswer(questionId, isCorrect); } catch(e) {}
    if (supabaseReady) {
        try {
            supabase.from('answer_logs').insert([{ question_id: questionId, is_correct: isCorrect }]).then(function(){});
        } catch(e) {}
    }
}

function nextQuestion() {
    // Block if current question hasn't been answered or skipped
    if (!answered && currentIndex < currentPool.length) {

    }
    if (currentIndex < currentPool.length - 1) {
        currentIndex++;
        var a = answers[currentPool[currentIndex].id];
        answered = a && !a.skipped;
        renderQuestion();
        updateUI();
        saveProgress();
    }
}

function prevQuestion() {
    if (currentIndex > 0) {

function showStats() {
    var raw = localStorage.getItem('microbio_stats');
    var stats = raw ? JSON.parse(raw) : {};

    var totalAttempts = 0, totalCorrect = 0;
    var rows = [];
    for (var id in stats) {
        if (stats.hasOwnProperty(id)) {
            var s = stats[id];
            totalAttempts += s.a;
            totalCorrect += s.c;
            rows.push({id: id, attempts: s.a, correct: s.c, rate: Math.round(s.c / s.a * 100)});
        }
    }
    rows.sort(function(a, b) { return a.rate - b.rate; }); // worst first

    var overallRate = totalAttempts > 0 ? Math.round(totalCorrect / totalAttempts * 100) : 0;

    document.getElementById('questionArea').style.display = 'none';
    document.getElementById('actions').style.display = 'none';

    var html = '<div class="card" style="max-height:70vh;overflow-y:auto">';
    html += '<h3 style="margin-bottom:12px">答题统计</h3>';

    if (rows.length === 0) {
        html += '<p style="color:var(--text-secondary);padding:24px 0;text-align:center">暂无答题数据</p>';
    } else {
        html += '<table style="width:100%;font-size:.82em;border-collapse:collapse">';
        html += '<tr style="border-bottom:2px solid var(--border)"><th style="padding:6px 4px;text-align:left">#</th><th style="padding:6px 4px;text-align:left">题干</th><th style="padding:6px 4px;text-align:right">答题</th><th style="padding:6px 4px;text-align:right">正确�?/th></tr>';
        for (var i = 0; i < rows.length; i++) {
            var r = rows[i];

            html += '<td style="padding:6px 4px">' + r.id + '</td>';
            html += '<td style="padding:6px 4px">' + esc(stem) + '</td>';
            html += '<td style="padding:6px 4px;text-align:right">' + r.attempts + '</td>';
            html += '<td style="padding:6px 4px;text-align:right;font-weight:600;color:' + rateColor + '">' + r.rate + '%</td>';
            html += '</tr>';
        }
        html += '</table>';
    }

    html += '<div style="display:flex;gap:8px;margin-top:16px;flex-wrap:wrap">';
    html += '<button onclick="exportStats()" style="padding:8px 16px;border-radius:8px;border:1.5px solid var(--border);background:var(--card-bg);color:var(--text);cursor:pointer;font-size:.85em;font-family:inherit">导出 CSV</button>';
    if (totalAttempts > 0) {
        html += '<button onclick="if(confirm(\'确定要清除所有统计数据吗？\')){localStorage.removeItem(\'microbio_stats\');showStats();}" style="padding:8px 16px;border-radius:8px;border:1.5px solid var(--wrong);background:var(--card-bg);color:var(--wrong);cursor:pointer;font-size:.85em;font-family:inherit">清除数据</button>';
    }
    html += '<button onclick="closeStats()" style="padding:8px 16px;border-radius:8px;border:1.5px solid var(--border);background:var(--accent);color:#fff;cursor:pointer;font-size:.85em;font-family:inherit;margin-left:auto">返回做题</button>';
    html += '</div>';

function exportStats() {
    var raw = localStorage.getItem('microbio_stats');
    var stats = raw ? JSON.parse(raw) : {};
    var csv = '题号,题干,题型,答题次数,正确次数,正确率\n';
    for (var id in stats) {
        if (stats.hasOwnProperty(id)) {
            var s = stats[id];
            var q = ALL_QUESTIONS.filter(function(qq) { return String(qq.id) === id; })[0];
            var stem = q ? q.stem.replace(/"/g, '""') : '';
            var type = q ? (q.type === 'choice' ? '选择�? : '判断�?) : '';
            csv += id + ',"' + stem + '",' + type + ',' + s.a + ',' + s.c + ',' + Math.round(s.c / s.a * 100) + '%\n';
        }
    }
    // Copy to clipboard via a temp textarea
    var ta = document.createElement('textarea');
    ta.value = csv;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    try {
        document.execCommand('copy');
        alert('已复制到剪贴板！可粘贴到 Excel 或记事本中查看�?);
    } catch(e) {
        alert('复制失败，请尝试截图保存。\n\n' + csv.substring(0, 500));
    }
    document.body.removeChild(ta);
}

    pickerSelected = {};
    for (var id in wrongSet) pickerSelected[id] = true;
    pickerRenderList();
}

function closePicker() {
    document.getElementById('pickerOverlay').classList.remove('show');
}

function pickerSetFilter(f, btn) {
    pickerFilter = f;
    var btns = document.querySelectorAll('#pickerFilters button');
    btns.forEach(function(b) { b.classList.toggle('on', b === btn); });
    pickerRenderList();
}

function pickerSelectAll() {
    var qs = pickerGetFiltered();
    qs.forEach(function(q) { pickerSelected[String(q.id)] = true; });
    pickerRenderList();
}

function pickerSelectNone() {
    pickerSelected = {};
    pickerRenderList();
}

function pickerSelectWrong() {
    for (var id in wrongSet) pickerSelected[id] = true;
    pickerRenderList();
}

function pickerGetFiltered() {
    pickerChapter = document.getElementById('pickerChapterFilter').value;
    var qs = ALL_QUESTIONS;
    if (pickerFilter === 'wrong') {
        qs = qs.filter(function(q) { return wrongSet[String(q.id)]; });
    } else if (pickerFilter !== 'all') {
        qs = qs.filter(function(q) { return q.type === pickerFilter; });
    }
    if (pickerChapter !== 'all') {
        qs = qs.filter(function(q) { return q.chapter === pickerChapter; });
    }
    return qs;
}

function pickerRenderList() {
    var qs = pickerGetFiltered();
    var typeNames = {choice:'�?,judge:'�?,fill:'�?,glossary:'�?,qa:'�?};
    var typeStyles = {choice:'#ede9fe;#7c3aed',judge:'#fce7f3;#db2777',fill:'#ecfdf5;#059669',glossary:'#fef3c7;#d97706',qa:'#ede9fe;#7c3aed'};
    var count = 0;
    var html = '';
    qs.forEach(function(q) {
        var id = String(q.id);
        var checked = pickerSelected[id] ? ' checked' : '';
        if (pickerSelected[id]) count++;
        var ts = typeStyles[q.type] || '#eee;#888';
        var parts = ts.split(';');
        var stem = (q.stem || '').replace(/----------/g, '___').substring(0, 60);
        html += '<div class="picker-item" onclick="pickerToggle(\'' + id + '\')">'
        + '<input type="checkbox"' + checked + ' onclick="event.stopPropagation();pickerToggle(\'' + id + '\')">'
        + '<span class="pi-id">#' + id + '</span>'
        + '<span class="pi-tag" style="background:' + parts[0] + ';color:' + parts[1] + '">' + (typeNames[q.type] || '?') + '</span>'
        + '<span class="pi-stem">' + esc(stem) + '</span>'
        + '</div>';
    });
    document.getElementById('pickerList').innerHTML = html || '<p style="text-align:center;color:#888;padding:40px">没有匹配的题�?/p>';
    document.getElementById('pickerCount').textContent = '已�?' + count + ' �?;
}

function pickerToggle(id) {
    if (pickerSelected[id]) delete pickerSelected[id];
    else pickerSelected[id] = true;
    pickerRenderList();
}

function startPickerPractice() {
    var ids = Object.keys(pickerSelected);
    if (ids.length === 0) { alert('请至少选择一�?); return; }
    closePicker();
    // Build pool from selected IDs
    var idMap = {};
    ALL_QUESTIONS.forEach(function(q) { idMap[String(q.id)] = q; });
    currentPool = [];
    ids.forEach(function(id) { if (idMap[id]) currentPool.push(idMap[id]); });
    // Reset progress for this custom session
    currentIndex = 0;
    answers = {};
    answered = false;
    // Hide wrong-only mode
    document.getElementById('btnWrongOnly').dataset.active = 'false';
    document.getElementById('btnWrongOnly').textContent = '只练错题';
    // Start
    updateProgress();
    renderQuestion();
    document.getElementById('questionArea').scrollIntoView({ behavior: 'smooth' });
}

// Load wrong set from localStorage
try {
    var saved = localStorage.getItem('microbio_wrongSet');
    if (saved) wrongSet = JSON.parse(saved);
} catch(e) {}


// ── All DOM-dependent initialization ──
function setupApp() {
    var el;

    if (el = document.getElementById('typeFilter')) el.addEventListener('change', function() { init(false); });
    if (el = document.getElementById('orderMode')) el.addEventListener('change', function() { init(false); });
    if (el = document.getElementById('chapterFilter')) el.addEventListener('change', function() { init(false); });
    if (el = document.getElementById('btnReset')) el.addEventListener('click', function() {
        localStorage.removeItem('microbio_progress');
        localStorage.removeItem('microbio_wrongSet');
        wrongSet = {};
        init(false);
    });
    if (el = document.getElementById('btnReveal')) el.addEventListener('click', revealAnswer);
    if (el = document.getElementById('btnNext')) el.addEventListener('click', nextQuestion);
    if (el = document.getElementById('btnPrev')) el.addEventListener('click', prevQuestion);
    if (el = document.getElementById('btnSkip')) el.addEventListener('click', skipQuestion);
    if (el = document.getElementById('btnWrongOnly')) el.addEventListener('click', toggleWrongOnly);
    if (el = document.getElementById('btnPicker')) el.addEventListener('click', openPicker);
    if (el = document.getElementById('btnStats')) el.addEventListener('click', showStats);

    var savedTheme = loadTheme();
    applyTheme(savedTheme);
    if (el = document.getElementById('btnTheme')) el.addEventListener('click', toggleTheme);

    try { init(); } catch(e) {
        var mb = document.getElementById('errorMsg');
        if (mb) { mb.style.display = 'block'; mb.textContent = 'Init Error: ' + e.message; }
    }
}

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setupApp);
} else {
    setupApp();
}

// Theme toggle
function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    var btn = document.getElementById('btnTheme');
    if (btn) btn.textContent = theme === 'dark' ? '☀�? : '🌙';
    try { localStorage.setItem('microbio_theme', theme); } catch(e) {}
}
function toggleTheme() {
    var current = document.documentElement.getAttribute('data-theme') || 'light';
    applyTheme(current === 'dark' ? 'light' : 'dark');
}
function loadTheme() {
    var t = localStorage.getItem('microbio_theme');
    if (t === 'dark' || t === 'light') return t;
    return 'light';
}

// Global error handler for debugging
window.onerror = function(msg, url, line, col, err) {
    var msgBox = document.getElementById('errorMsg');
    if (msgBox) {
        msgBox.style.display = 'block';
        msgBox.textContent = 'JS Error (line ' + line + '): ' + msg;
    }
};
